name: Terraform Acceptance tests

on:
  workflow_run:
    workflows: [Build]
    types: [completed]

env:
  DOMAIN: fundament.digilab.reviews

jobs:
  # We need this check, because the 'Build' workflow can also complete because of the 'Teardown' step
  # If so, we don't want to run this workflow.
  check:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'
    permissions:
      pull-requests: read
    outputs:
      should-run: ${{ steps.pr-check.outputs.should-run }}
      pr-number: ${{ steps.pr-check.outputs.pr-number }}
      head-sha: ${{ steps.pr-check.outputs.head-sha }}
    steps:
      - name: Check PR is open
        id: pr-check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"
          if [ -z "${PR_NUMBER}" ]; then
            echo "No PR attached to this workflow run, skipping."
            echo "should-run=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          PR_STATE=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER} --jq '.state')
          echo "pr-number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "head-sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          if [ "$PR_STATE" = "open" ]; then
            echo "should-run=true" >> $GITHUB_OUTPUT
          else
            echo "PR #${PR_NUMBER} is ${PR_STATE}, skipping."
            echo "should-run=false" >> $GITHUB_OUTPUT
          fi

  run-tests:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PR_NUMBER: ${{ needs.check.outputs.pr-number }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.check.outputs.head-sha }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install tofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Wait for organization-api
        run: |
          URL="https://organization.pr${PR_NUMBER}.${{ env.DOMAIN }}"
          echo "Waiting for ${URL} to be ready..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "${URL}" || true)
            if [ "${STATUS}" = "200" ] || [ "${STATUS}" = "401" ] || [ "${STATUS}" = "404" ]; then
              echo "Organization API is ready (HTTP ${STATUS})"
              exit 0
            fi
            if [ "${STATUS}" = "000" ] || [ "${STATUS}" = "502" ] || [ "${STATUS}" = "503" ] || [ "${STATUS}" = "504" ]; then
              echo "Attempt ${i}/30, not ready yet (HTTP ${STATUS}), retrying in 30s..."
            else
              echo "Organization API responded with unexpected status (HTTP ${STATUS}), failing."
              exit 1
            fi
            sleep 30
          done
          echo "Timed out waiting for environment to be ready"
          exit 1

      - name: Run Terraform acceptance tests
        run: |
          cd terraform-provider
          FUNDAMENT_ENDPOINT="https://organization.pr${PR_NUMBER}.${{ env.DOMAIN }}" \
          TF_ACC=1 \
          TF_ACC_TERRAFORM_PATH="$(which tofu)" \
          TF_ACC_PROVIDER_HOST=registry.opentofu.org \
          go test -v ./...

name: govulncheck
on:
  push:
  pull_request:
  schedule: # daily at 10:30 UTC
    - cron: '30 10 * * *'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  govulncheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
      - name: Check dependency age
        run: go run ./tools/gomod-age/cmd/gomod-age --config .gomod-age.json

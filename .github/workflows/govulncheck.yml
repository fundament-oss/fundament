name: govulncheck
on:
  push:
  pull_request:
  schedule: # daily at 10:30 UTC
    - cron: '30 10 * * *'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
      - name: Check dependency age
        run: |
          go run github.com/fchimpan/gomod-age@latest -config .gomod-age.json || {
            echo ""
            echo "To allow a fresh dependency, add it to .gomod-age.json:"
            echo '  { "allow": [{ "module": "<module>", "version": "<version>", "reason": "<reason>" }] }'
            exit 1
          }

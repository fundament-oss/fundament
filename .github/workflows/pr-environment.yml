name: PR Environment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [master]

concurrency:
  group: pr-env-${{ github.event.number }}
  cancel-in-progress: false

env:
  PR_NUMBER: ${{ github.event.number }}
  DOMAIN: fundament.apps.digilab.network
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/fundament

jobs:
  # Build and push all images for the PR
  build:
    if: github.event.action != 'closed'
    strategy:
      matrix:
        include:
          - image-name: authn-api
            dockerfile: authn-api/Dockerfile
            context: "."
          - image-name: organization-api
            dockerfile: organization-api/Dockerfile
            context: "."
          - image-name: db-migrations
            dockerfile: db/Dockerfile
            context: db
          - image-name: console-frontend
            dockerfile: console-frontend/Dockerfile
            context: "."
          - image-name: cluster-worker
            dockerfile: cluster-worker/Dockerfile
            context: "."
          - image-name: authz-worker
            dockerfile: authz-worker/Dockerfile
            context: "."
          - image-name: openfga-setup
            dockerfile: openfga/setup/Dockerfile
            context: openfga/setup
          - image-name: docs-frontend
            dockerfile: docs-frontend/Dockerfile
            context: "."
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-image.yml
    secrets: inherit
    with:
      image-name: ${{ matrix.image-name }}
      dockerfile: ${{ matrix.dockerfile }}
      context: ${{ matrix.context }}

  # Deploy: commit PR overlay to GitLab Flux repo
  deploy:
    if: github.event.action != 'closed'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      IMAGE_TAG: ${{ github.sha }}-${{ github.event.number }}-merge-${{ github.run_number }}
      PR_BRANCH: ${{ github.event.pull_request.head.ref }}
      JWT_SECRET: ${{ secrets.PR_JWT_SECRET }}
    steps:
      - name: Clone Flux repo
        run: |
          git clone --depth 1 "https://oauth2:${{ secrets.GITLAB_TOKEN }}@${{ vars.GITLAB_REPO_HOST }}/${{ vars.GITLAB_REPO_PATH }}.git" flux-repo
          cd flux-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate PR overlay
        run: |
          cd flux-repo
          PR_DIR="apps/fundament/overlays/pr/pr-${PR_NUMBER}"
          mkdir -p "$PR_DIR"

          export PR_NUM="$PR_NUMBER"
          export PR_BRANCH="$PR_BRANCH"
          export DOMAIN="$DOMAIN"
          export IMAGE_PREFIX="$IMAGE_PREFIX"
          export IMAGE_TAG="$IMAGE_TAG"
          export JWT_SECRET="$JWT_SECRET"

          # Generate resources.yaml using envsubst for clean variable substitution.
          # Only the listed variables are substituted; dollar signs in bcrypt hashes are left intact.
          envsubst '${PR_NUM} ${PR_BRANCH} ${DOMAIN} ${IMAGE_PREFIX} ${IMAGE_TAG} ${JWT_SECRET}' > "$PR_DIR/resources.yaml" << 'TEMPLATE'
          apiVersion: v1
          kind: Namespace
          metadata:
            name: tn-fundament-pr-${PR_NUM}
          ---
          apiVersion: source.toolkit.fluxcd.io/v1
          kind: GitRepository
          metadata:
            name: fundament
            namespace: tn-fundament-pr-${PR_NUM}
          spec:
            interval: 1m
            url: https://github.com/fundament-oss/fundament
            ref:
              branch: ${PR_BRANCH}
          ---
          apiVersion: helm.toolkit.fluxcd.io/v2
          kind: HelmRelease
          metadata:
            name: fundament
            namespace: tn-fundament-pr-${PR_NUM}
          spec:
            releaseName: fundament
            timeout: 15m
            install:
              createNamespace: true
              disableWait: true
            upgrade:
              disableWait: true
            interval: 5m
            chart:
              spec:
                chart: charts/fundament
                sourceRef:
                  kind: GitRepository
                  name: fundament
                reconcileStrategy: Revision
                interval: 1m
            values:
              jwtSecret: ${JWT_SECRET}

              externalUrls:
                authn: https://authn.pr${PR_NUM}.${DOMAIN}
                organization: https://organization.pr${PR_NUM}.${DOMAIN}
                console: https://console.pr${PR_NUM}.${DOMAIN}
                docs: https://docs.pr${PR_NUM}.${DOMAIN}
                cookieDomain: pr${PR_NUM}.${DOMAIN}
                corsAllowedOrigins: "https://console.pr${PR_NUM}.${DOMAIN}"

              images:
                dbMigrations: ${IMAGE_PREFIX}/db-migrations:${IMAGE_TAG}
                authnApi: ${IMAGE_PREFIX}/authn-api:${IMAGE_TAG}
                organizationApi: ${IMAGE_PREFIX}/organization-api:${IMAGE_TAG}
                consoleFrontend: ${IMAGE_PREFIX}/console-frontend:${IMAGE_TAG}
                docsFrontend: ${IMAGE_PREFIX}/docs-frontend:${IMAGE_TAG}
                clusterWorker: ${IMAGE_PREFIX}/cluster-worker:${IMAGE_TAG}
                authzWorker: ${IMAGE_PREFIX}/authz-worker:${IMAGE_TAG}
                openfgaSetup: ${IMAGE_PREFIX}/openfga-setup:${IMAGE_TAG}

              db:
                enabled: true
                instances: 1
                reset: true
                storageSize: 1Gi
                insertTestData: true

              authnApi:
                enabled: true
                replicas: 1
                logLevel: debug
              organizationApi:
                enabled: true
                replicas: 1
                logLevel: debug
              consoleFrontend:
                enabled: true
                replicas: 1
              docsFrontend:
                enabled: true
                replicas: 1
              clusterWorker:
                enabled: true
                replicas: 1
                logLevel: debug
                gardenerMode: mock
              authzWorker:
                enabled: true
                replicas: 1
                logLevel: debug
                pollInterval: "2s"
                batchSize: 100
              openfga:
                enabled: true
                apiPort: 18080
                playground:
                  enabled: false

              dex:
                enabled: true
                issuer: https://dex.pr${PR_NUM}.${DOMAIN}
                discoveryUrl: http://fundament-dex:5556
                staticClients:
                  - id: fundament
                    name: Fundament
                    redirectURIs:
                      - https://authn.pr${PR_NUM}.${DOMAIN}/callback
                    public: true
                staticPasswords:
                  - email: alice@acme-corp.com
                    hash: "$2y$10$KdEtpACqX8Jh0AYF2n1sfeySkYkG8hRK6Tmn85/VpvaVVPgxL3Hsi"
                    username: Alice Johnson
                    userID: "019b4000-1000-7000-8000-000000000001"
                  - email: bob@acme-corp.com
                    hash: "$2y$10$KdEtpACqX8Jh0AYF2n1sfeySkYkG8hRK6Tmn85/VpvaVVPgxL3Hsi"
                    username: Bob Smith
                    userID: "019b4000-1000-7000-8000-000000000002"
                  - email: david@globex.com
                    hash: "$2y$10$KdEtpACqX8Jh0AYF2n1sfeySkYkG8hRK6Tmn85/VpvaVVPgxL3Hsi"
                    username: David Brown
                    userID: "019b4000-1000-7000-8000-000000000004"

              ingress:
                enabled: true
                className: nginx
                domain: ${DOMAIN}
                subdomainInfix: "pr${PR_NUM}."
                tls:
                  clusterIssuer: letsencrypt-prod
          TEMPLATE

      - name: Update kustomization.yaml
        run: |
          cd flux-repo
          KUSTOMIZATION="apps/fundament/overlays/pr/kustomization.yaml"

          # Create base kustomization if it doesn't exist
          if [ ! -f "$KUSTOMIZATION" ]; then
            mkdir -p "$(dirname "$KUSTOMIZATION")"
            cat > "$KUSTOMIZATION" << 'EOF'
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          resources:
          EOF
          fi

          # Add PR resource entry if not already present
          PR_ENTRY="pr-${PR_NUMBER}/resources.yaml"
          if ! grep -q "$PR_ENTRY" "$KUSTOMIZATION"; then
            echo "  - $PR_ENTRY" >> "$KUSTOMIZATION"
          fi

      - name: Commit and push
        run: |
          cd flux-repo
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "deploy: PR #${PR_NUMBER} environment

          Commit: ${IMAGE_TAG}
          Branch: ${PR_BRANCH}"
            git push
          fi

      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-environment
          message: |
            ## PR Environment

            | Service | URL |
            |---------|-----|
            | Console | https://console.pr${{ env.PR_NUMBER }}.${{ env.DOMAIN }} |
            | Authn API | https://authn.pr${{ env.PR_NUMBER }}.${{ env.DOMAIN }} |
            | Organization API | https://organization.pr${{ env.PR_NUMBER }}.${{ env.DOMAIN }} |
            | Docs | https://docs.pr${{ env.PR_NUMBER }}.${{ env.DOMAIN }} |

            **Commit:** `${{ env.IMAGE_TAG }}`
            **Namespace:** `tn-fundament-pr-${{ env.PR_NUMBER }}`

            > Environment will be ready once Flux reconciles (~5 min after images are built).

            <details>
            <summary>Test credentials (all passwords: <code>password</code>)</summary>

            - alice@acme-corp.com
            - bob@acme-corp.com
            - david@globex.com
            </details>

  # Teardown: remove PR overlay from GitLab Flux repo
  teardown:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Clone Flux repo
        run: |
          git clone --depth 1 "https://oauth2:${{ secrets.GITLAB_TOKEN }}@${{ vars.GITLAB_REPO_HOST }}/${{ vars.GITLAB_REPO_PATH }}.git" flux-repo
          cd flux-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Remove PR overlay
        run: |
          cd flux-repo
          PR_DIR="apps/fundament/overlays/pr/pr-${PR_NUMBER}"

          # Remove PR directory
          rm -rf "$PR_DIR"

          # Remove entry from kustomization.yaml
          KUSTOMIZATION="apps/fundament/overlays/pr/kustomization.yaml"
          if [ -f "$KUSTOMIZATION" ]; then
            sed -i "\|pr-${PR_NUMBER}/resources.yaml|d" "$KUSTOMIZATION"
          fi

      - name: Commit and push
        run: |
          cd flux-repo
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "teardown: PR #${PR_NUMBER} environment"
            git push
          fi

      - name: Update PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-environment
          message: |
            ## PR Environment - Torn Down

            The environment for this PR has been removed.

name: Build

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [master]

concurrency:
  group: build-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOMAIN: fundament.digilab.reviews
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/fundament

jobs:
  build:
    if: github.event.action != 'closed'
    strategy:
      matrix:
        include:
          - image-name: authn-api
            dockerfile: authn-api/Dockerfile
            context: "."
          - image-name: organization-api
            dockerfile: organization-api/Dockerfile
            context: "."
          - image-name: db-migrations
            dockerfile: db/Dockerfile
            context: db
          - image-name: console-frontend
            dockerfile: console-frontend/Dockerfile
            context: "."
          - image-name: cluster-worker
            dockerfile: cluster-worker/Dockerfile
            context: "."
          - image-name: authz-worker
            dockerfile: authz-worker/Dockerfile
            context: "."
          - image-name: openfga-setup
            dockerfile: openfga/setup/Dockerfile
            context: openfga/setup
          - image-name: docs-frontend
            dockerfile: docs-frontend/Dockerfile
            context: "."
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-image.yml
    secrets: inherit
    with:
      image-name: ${{ matrix.image-name }}
      dockerfile: ${{ matrix.dockerfile }}
      context: ${{ matrix.context }}

  deploy:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      PR_NUMBER: ${{ github.event.number }}
      PR_BRANCH: ${{ github.event.pull_request.head.ref }}
      JWT_SECRET: ${{ secrets.PR_JWT_SECRET }}
    steps:
      - uses: actions/checkout@v5

      - name: Compute image tag
        run: |
          REF_NAME=$(echo '${{ github.ref_name }}' | tr '/' '-')
          echo "IMAGE_TAG=${{ github.sha }}-${REF_NAME}-${{ github.run_number }}" >> $GITHUB_ENV

      - name: Clone Flux repo
        run: |
          git clone --depth 1 "https://oauth2:${{ secrets.GITLAB_TOKEN }}@${{ vars.GITLAB_REPO_HOST }}/${{ vars.GITLAB_REPO_PATH }}.git" flux-repo
          cd flux-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate PR overlay
        run: |
          PR_DIR="flux-repo/apps/fundament/overlays/pr/pr-${PR_NUMBER}"
          mkdir -p "$PR_DIR"

          export PR_NUM="$PR_NUMBER"
          export PR_BRANCH="$PR_BRANCH"
          export DOMAIN="$DOMAIN"
          export IMAGE_PREFIX="$IMAGE_PREFIX"
          export IMAGE_TAG="$IMAGE_TAG"
          export JWT_SECRET="$JWT_SECRET"

          # Generate resources.yaml from the template in the repo.
          # Only the listed variables are substituted; dollar signs in bcrypt hashes are left intact.
          envsubst '${PR_NUM} ${PR_BRANCH} ${DOMAIN} ${IMAGE_PREFIX} ${IMAGE_TAG} ${JWT_SECRET}' \
            < charts/fundament/pr-overlay.yaml \
            > "$PR_DIR/resources.yaml"

      - name: Update kustomization.yaml
        run: |
          cd flux-repo
          KUSTOMIZATION="apps/fundament/overlays/pr/kustomization.yaml"

          # Create base kustomization if it doesn't exist
          if [ ! -f "$KUSTOMIZATION" ]; then
            mkdir -p "$(dirname "$KUSTOMIZATION")"
            cat > "$KUSTOMIZATION" << 'EOF'
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          resources:
          EOF
          fi

          # Add PR resource entry if not already present
          PR_ENTRY="pr-${PR_NUMBER}/resources.yaml"
          if ! grep -q "$PR_ENTRY" "$KUSTOMIZATION"; then
            echo "  - $PR_ENTRY" >> "$KUSTOMIZATION"
          fi

      - name: Commit and push
        run: |
          cd flux-repo
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "deploy: PR #${PR_NUMBER} environment

          Commit: ${IMAGE_TAG}
          Branch: ${PR_BRANCH}"
            git push
          fi

      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-environment
          message: |
            ## PR Environment

            | Service | URL |
            |---------|-----|
            | Console | https://console.pr${{ env.PR_NUMBER }}.${{ env.DOMAIN }} |
            | Authn API | https://authn.pr${{ env.PR_NUMBER }}.${{ env.DOMAIN }} |
            | Organization API | https://organization.pr${{ env.PR_NUMBER }}.${{ env.DOMAIN }} |
            | Docs | https://docs.pr${{ env.PR_NUMBER }}.${{ env.DOMAIN }} |

            **Commit:** `${{ env.IMAGE_TAG }}`
            **Namespace:** `tn-fundament-pr-${{ env.PR_NUMBER }}`

            > Environment will be ready once Flux reconciles (~5 min after images are built).

            <details>
            <summary>Test credentials (all passwords: <code>password</code>)</summary>

            - alice@acme-corp.com (Acme Corp)
            - bart@acme-corp.com (Acme Corp)
            - cindy@acme-corp.com (Acme Corp)
            - david@globex.com (Globex)
            - emily@globex.com (Globex)
            - frank@initech.com (Initech)
            - grace@initech.com (Initech)
            </details>

  terraform-acc:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PR_NUMBER: ${{ github.event.number }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install tofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Wait for organization-api
        run: |
          URL="https://organization.pr${PR_NUMBER}-${{ env.DOMAIN }}"
          echo "Waiting for ${URL} to be ready..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "${URL}" || true)
            if [ "${STATUS}" != "000" ]; then
              echo "Organization API responded (HTTP ${STATUS})"
              exit 0
            fi
            echo "Attempt ${i}/30, retrying in 30s..."
            sleep 30
          done
          echo "Timed out waiting for environment to be ready"
          exit 1

      - name: Run Terraform acceptance tests
        run: |
          cd terraform-provider
          FUNDAMENT_ENDPOINT="https://organization.pr${PR_NUMBER}-${{ env.DOMAIN }}" \
          TF_ACC=1 \
          TF_ACC_TERRAFORM_PATH="$(which tofu)" \
          TF_ACC_PROVIDER_HOST=registry.opentofu.org \
          go test -v ./...

  teardown:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      PR_NUMBER: ${{ github.event.number }}
    steps:
      - name: Clone Flux repo
        run: |
          git clone --depth 1 "https://oauth2:${{ secrets.GITLAB_TOKEN }}@${{ vars.GITLAB_REPO_HOST }}/${{ vars.GITLAB_REPO_PATH }}.git" flux-repo
          cd flux-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Remove PR overlay
        run: |
          cd flux-repo
          PR_DIR="apps/fundament/overlays/pr/pr-${PR_NUMBER}"

          # Remove PR directory
          rm -rf "$PR_DIR"

          # Remove entry from kustomization.yaml
          KUSTOMIZATION="apps/fundament/overlays/pr/kustomization.yaml"
          if [ -f "$KUSTOMIZATION" ]; then
            sed -i "\|pr-${PR_NUMBER}/resources.yaml|d" "$KUSTOMIZATION"
          fi

      - name: Commit and push
        run: |
          cd flux-repo
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "teardown: PR #${PR_NUMBER} environment"
            git push
          fi

      - name: Update PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-environment
          message: |
            ## PR Environment - Torn Down

            The environment for this PR has been removed.

name: Build

on:
  push:
    branches: [master]
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
      - ready_for_review
      - converted_to_draft
      - labeled
      - unlabeled
    branches: [master]

concurrency:
  group: build-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOMAIN: fundament.digilab.reviews
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/fundament
  PR_NUMBER: ${{ github.event.number }}

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      should_teardown: ${{ steps.check.outputs.should_teardown }}
    steps:
      - id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          ACTION: ${{ github.event.action }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
          LABEL_NAME: ${{ github.event.label.name }}
          HAS_SKIP_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'no-preview-env') }}
        run: |
          should_deploy=false
          should_teardown=false

          if [ "$EVENT_NAME" = "pull_request" ]; then
            case "$ACTION" in
              closed|converted_to_draft)
                should_teardown=true
                ;;
              labeled)
                [ "$LABEL_NAME" = "no-preview-env" ] && should_teardown=true
                ;;
              opened|reopened|synchronize|ready_for_review|unlabeled)
                if [ "$IS_DRAFT" = "false" ] && [ "$HAS_SKIP_LABEL" = "false" ]; then
                  should_deploy=true
                fi
                ;;
            esac
          fi

          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"
          echo "should_teardown=$should_teardown" >> "$GITHUB_OUTPUT"

  build:
    needs: gate
    if: github.event_name == 'push' || needs.gate.outputs.should_deploy == 'true'
    strategy:
      matrix:
        include:
          - image-name: authn-api
            dockerfile: authn-api/Dockerfile
            context: "."
          - image-name: organization-api
            dockerfile: organization-api/Dockerfile
            context: "."
          - image-name: db-migrations
            dockerfile: db/Dockerfile
            context: db
          - image-name: console-frontend
            dockerfile: console-frontend/Dockerfile
            context: "."
          - image-name: cluster-worker
            dockerfile: cluster-worker/Dockerfile
            context: "."
          - image-name: authz-worker
            dockerfile: authz-worker/Dockerfile
            context: "."
          - image-name: kube-api-proxy
            dockerfile: kube-api-proxy/Dockerfile
            context: "."
          - image-name: openfga-setup
            dockerfile: openfga/setup/Dockerfile
            context: openfga/setup
          - image-name: docs-frontend
            dockerfile: docs-frontend/Dockerfile
            context: "."
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-image.yml
    secrets: inherit
    with:
      image-name: ${{ matrix.image-name }}
      dockerfile: ${{ matrix.dockerfile }}
      context: ${{ matrix.context }}

  deploy:
    needs: [gate, build]
    if: needs.gate.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      PR_BRANCH: ${{ github.event.pull_request.head.ref }}
      JWT_SECRET: ${{ secrets.PR_JWT_SECRET }}
    steps:
      - uses: actions/checkout@v5

      - name: Compute image tag
        run: |
          REF_NAME=$(echo '${{ github.ref_name }}' | tr '/' '-')
          echo "IMAGE_TAG=${{ github.sha }}-${REF_NAME}-${{ github.run_number }}" >> $GITHUB_ENV

      - name: Clone Flux repo
        run: |
          git clone --depth 1 "https://oauth2:${{ secrets.GITLAB_TOKEN }}@${{ vars.GITLAB_REPO_HOST }}/${{ vars.GITLAB_REPO_PATH }}.git" flux-repo
          cd flux-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate PR overlay
        run: |
          PR_DIR="flux-repo/apps/fundament/overlays/pr/pr-${PR_NUMBER}"
          mkdir -p "$PR_DIR"

          export PR_NUM="$PR_NUMBER"
          export PR_BRANCH="$PR_BRANCH"
          export DOMAIN="$DOMAIN"
          export IMAGE_PREFIX="$IMAGE_PREFIX"
          export IMAGE_TAG="$IMAGE_TAG"
          export JWT_SECRET="$JWT_SECRET"

          # Generate resources.yaml from the template in the repo.
          # Only the listed variables are substituted; dollar signs in bcrypt hashes are left intact.
          envsubst '${PR_NUM} ${PR_BRANCH} ${DOMAIN} ${IMAGE_PREFIX} ${IMAGE_TAG} ${JWT_SECRET}' \
            < charts/fundament/pr-overlay.yaml \
            > "$PR_DIR/resources.yaml"

      - name: Update kustomization.yaml
        run: |
          cd flux-repo
          KUSTOMIZATION="apps/fundament/overlays/pr/kustomization.yaml"

          # Create base kustomization if it doesn't exist
          if [ ! -f "$KUSTOMIZATION" ]; then
            mkdir -p "$(dirname "$KUSTOMIZATION")"
            cat > "$KUSTOMIZATION" << 'EOF'
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          resources:
          EOF
          fi

          # Add PR resource entry if not already present
          PR_ENTRY="pr-${PR_NUMBER}/resources.yaml"
          if ! grep -q "$PR_ENTRY" "$KUSTOMIZATION"; then
            echo "  - $PR_ENTRY" >> "$KUSTOMIZATION"
          fi

      - name: Commit and push
        run: |
          cd flux-repo
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "deploy: PR #${PR_NUMBER} environment

          Commit: ${IMAGE_TAG}
          Branch: ${PR_BRANCH}"
            git push
          fi

      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-environment
          message: |
            ## PR Environment

            | Service | URL |
            |---------|-----|
            | Console | https://console.pr${{ env.PR_NUMBER }}.${{ env.DOMAIN }} |
            | Authn API | https://authn.pr${{ env.PR_NUMBER }}.${{ env.DOMAIN }} |
            | Organization API | https://organization.pr${{ env.PR_NUMBER }}.${{ env.DOMAIN }} |
            | Kube API Proxy | https://k8s-api.pr${{ env.PR_NUMBER }}.${{ env.DOMAIN }} |
            | Docs | https://docs.pr${{ env.PR_NUMBER }}.${{ env.DOMAIN }} |

            **Commit:** `${{ env.IMAGE_TAG }}`
            **Namespace:** `tn-fundament-pr-${{ env.PR_NUMBER }}`

            > Environment will be ready once Flux reconciles (~5 min after images are built).

            <details>
            <summary>Test credentials (all passwords: <code>password</code>)</summary>

            - alice@acme-corp.com (Acme Corp)
            - bart@acme-corp.com (Acme Corp)
            - cindy@acme-corp.com (Acme Corp)
            - david@globex.com (Globex)
            - emily@globex.com (Globex)
            - frank@initech.com (Initech)
            - grace@initech.com (Initech)
            </details>

  terraform-acc-tests:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install tofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Wait for APIs
        run: |
          wait_for_api() {
            local NAME=$1
            local URL=$2
            echo "Waiting for ${NAME} at ${URL} to be ready..."
            for i in $(seq 1 30); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "${URL}" || true)
              if [ "${STATUS}" = "200" ] || [ "${STATUS}" = "401" ] || [ "${STATUS}" = "404" ]; then
                echo "${NAME} is ready (HTTP ${STATUS})"
                return 0
              fi
              if [ "${STATUS}" = "000" ] || [ "${STATUS}" = "502" ] || [ "${STATUS}" = "503" ] || [ "${STATUS}" = "504" ]; then
                echo "${NAME}: attempt ${i}/30, not ready yet (HTTP ${STATUS}), retrying in 30s..."
              else
                echo "${NAME} responded with unexpected status (HTTP ${STATUS}), failing."
                return 1
              fi
              sleep 30
            done
            echo "Timed out waiting for ${NAME} to be ready"
            return 1
          }

          BASE="pr${{ env.PR_NUMBER }}.${{ env.DOMAIN }}"
          wait_for_api "organization-api" "https://organization.${BASE}" && \
          wait_for_api "authn-api" "https://authn.${BASE}"

      - name: Run Terraform acceptance tests
        run: |
          cd terraform-provider
          FUNDAMENT_ENDPOINT="https://organization.pr${{ env.PR_NUMBER }}.${{ env.DOMAIN }}" \
          TF_ACC=1 \
          TF_ACC_TERRAFORM_PATH="$(which tofu)" \
          TF_ACC_PROVIDER_HOST=registry.opentofu.org \
          go test -v ./...

  e2e-tests:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd e2e && bun install

      - name: Install Playwright browsers
        run: cd e2e && bunx playwright install chromium --with-deps

      - name: Wait for APIs
        run: |
          wait_for_api() {
            local NAME=$1
            local URL=$2
            echo "Waiting for ${NAME} at ${URL} to be ready..."
            for i in $(seq 1 30); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "${URL}" || true)
              if [ "${STATUS}" = "200" ] || [ "${STATUS}" = "401" ] || [ "${STATUS}" = "404" ]; then
                echo "${NAME} is ready (HTTP ${STATUS})"
                return 0
              fi
              if [ "${STATUS}" = "000" ] || [ "${STATUS}" = "502" ] || [ "${STATUS}" = "503" ] || [ "${STATUS}" = "504" ]; then
                echo "${NAME}: attempt ${i}/30, not ready yet (HTTP ${STATUS}), retrying in 30s..."
              else
                echo "${NAME} responded with unexpected status (HTTP ${STATUS}), failing."
                return 1
              fi
              sleep 30
            done
            echo "Timed out waiting for ${NAME} to be ready"
            return 1
          }

          BASE="pr${{ env.PR_NUMBER }}.${{ env.DOMAIN }}"
          wait_for_api "console" "https://console.${BASE}" && \
          wait_for_api "authn-api" "https://authn.${BASE}" && \
          wait_for_api "organization-api" "https://organization.${BASE}"

      - name: Run E2E tests
        run: |
          cd e2e
          BASE_URL="https://console.pr${{ env.PR_NUMBER }}.${{ env.DOMAIN }}" \
          ORGANIZATION_API_URL="https://organization.pr${{ env.PR_NUMBER }}.${{ env.DOMAIN }}" \
          AUTHN_API_URL="https://authn.pr${{ env.PR_NUMBER }}.${{ env.DOMAIN }}" \
          bun run test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: e2e/reports/

  teardown:
    needs: gate
    if: needs.gate.outputs.should_teardown == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Clone Flux repo
        run: |
          git clone --depth 1 "https://oauth2:${{ secrets.GITLAB_TOKEN }}@${{ vars.GITLAB_REPO_HOST }}/${{ vars.GITLAB_REPO_PATH }}.git" flux-repo
          cd flux-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Remove PR overlay
        run: |
          cd flux-repo
          PR_DIR="apps/fundament/overlays/pr/pr-${PR_NUMBER}"

          # Remove PR directory
          rm -rf "$PR_DIR"

          # Remove entry from kustomization.yaml
          KUSTOMIZATION="apps/fundament/overlays/pr/kustomization.yaml"
          if [ -f "$KUSTOMIZATION" ]; then
            sed -i "\|pr-${PR_NUMBER}/resources.yaml|d" "$KUSTOMIZATION"
          fi

      - name: Commit and push
        run: |
          cd flux-repo
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "teardown: PR #${PR_NUMBER} environment"
            git push
          fi

      - name: Update PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-environment
          message: |
            ## PR Environment - Torn Down

            The environment for this PR has been removed.

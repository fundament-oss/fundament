edition = "2023";

package authn.v1;

import "google/protobuf/go_features.proto";

option features.field_presence = IMPLICIT;
option features.(pb.go).api_level = API_OPAQUE;
option go_package = "github.com/fundament-oss/fundament/authn-api/pkg/proto/gen/authn/v1;authnv1";

service AuthnService {
  // GetUserInfo returns the current user's information
  // Validates the JWT from Authorization header or cookie
  rpc GetUserInfo(GetUserInfoRequest) returns (GetUserInfoResponse);
}

// TokenService handles API token operations
service TokenService {
  // ExchangeToken exchanges an API key for a short-lived JWT
  // The API key should be provided in the Authorization header as Bearer token
  rpc ExchangeToken(ExchangeTokenRequest) returns (ExchangeTokenResponse);
  // MintPluginToken issues a short-lived JWT scoped to a specific plugin
  // installation on a specific cluster. The caller authenticates with a
  // UserToken (Authorization: Bearer, or auth cookie). The minted token
  // carries aud=fundament-plugin and is rejected by every API except
  // kube-api-proxy and plugin-proxy. See FUN-17.
  rpc MintPluginToken(MintPluginTokenRequest) returns (MintPluginTokenResponse);
}

message GetUserInfoRequest {}

message GetUserInfoResponse {
  // User information
  User user = 10;
}

message User {
  // User ID
  string id = 10;
  // Organization IDs
  repeated string organization_ids = 20;
  // User name
  string name = 30;
  // External ID from OIDC provider
  string external_ref = 40;
  // Groups the user belongs to
  repeated string groups = 50;
}

// ExchangeToken request - empty, API key is in Authorization header
message ExchangeTokenRequest {}

// ExchangeToken response
message ExchangeTokenResponse {
  // JWT access token for API calls
  string access_token = 10;
  // Token type (always "Bearer")
  string token_type = 20;
  // Seconds until token expires
  int64 expires_in = 30;
}

// MintPluginToken request - identifies the plugin installation the caller
// wants to act through. The caller's UserToken is taken from the
// Authorization header or auth cookie.
message MintPluginTokenRequest {
  // The cluster the plugin installation lives on.
  string cluster_id = 10;
  // The plugin installation to act through (PluginInstallation CR name).
  string installation_id = 20;
}

// MintPluginToken response
message MintPluginTokenResponse {
  // JWT access token (aud=fundament-plugin) for API calls to
  // kube-api-proxy and plugin-proxy.
  string access_token = 10;
  // Token type (always "Bearer")
  string token_type = 20;
  // Seconds until token expires (15 minutes; mint again to refresh)
  int64 expires_in = 30;
}

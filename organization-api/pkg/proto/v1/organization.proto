edition = "2023";

package organization.v1;

import "buf/validate/validate.proto";
import "google/protobuf/go_features.proto";
import "google/protobuf/timestamp.proto";

option features.(pb.go).api_level = API_OPAQUE;
option features.field_presence = IMPLICIT;
option go_package = "github.com/fundament-oss/fundament/organization-api/pkg/proto/gen/v1;organizationv1";

// OrganizationService manages organizations
service OrganizationService {
  // ListOrganizations lists all organizations the current user belongs to
  rpc ListOrganizations(ListOrganizationsRequest) returns (ListOrganizationsResponse);

  // GetOrganization retrieves the user's organization by ID
  rpc GetOrganization(GetOrganizationRequest) returns (GetOrganizationResponse);

  // UpdateOrganization updates the user's organization
  rpc UpdateOrganization(UpdateOrganizationRequest) returns (UpdateOrganizationResponse);

  // GetOrganizationLimits retrieves the resource limits for an organization
  rpc GetOrganizationLimits(GetOrganizationLimitsRequest) returns (GetOrganizationLimitsResponse);

  // UpdateOrganizationLimits sets the resource limits for an organization
  rpc UpdateOrganizationLimits(UpdateOrganizationLimitsRequest) returns (UpdateOrganizationLimitsResponse);
}

// Organization information
message Organization {
  // Organization ID (UUID)
  string id = 10;
  // Organization name (immutable, machine-readable identifier)
  string name = 20;
  // Organization alias (human-readable label)
  string alias = 30;
  // Creation timestamp (RFC3339)
  google.protobuf.Timestamp created = 40;
}

// GetOrganization request
message GetOrganizationRequest {
  // ID of the organization to retrieve
  string id = 10 [(buf.validate.field).string = {uuid: true}];
}

// GetOrganization response
message GetOrganizationResponse {
  // The requested organization
  Organization organization = 10;
}

// UpdateOrganization request
message UpdateOrganizationRequest {
  // ID of the organization to update
  string id = 10 [(buf.validate.field).string = {uuid: true}];
  // New alias for the organization
  string alias = 20 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
}

// UpdateOrganization response
message UpdateOrganizationResponse {}

// ListOrganizations request
message ListOrganizationsRequest {}

// ListOrganizations response
message ListOrganizationsResponse {
  // List of organizations the user belongs to
  repeated Organization organizations = 10;
}

// OrganizationLimits holds Gardener cluster quotas and Kubernetes namespace LimitRange defaults
message OrganizationLimits {
  // Maximum total number of nodes across all node pools in a shoot cluster
  int32 max_nodes_per_cluster = 10 [features.field_presence = EXPLICIT];
  // Maximum number of node pools per shoot cluster
  int32 max_node_pools_per_cluster = 20 [features.field_presence = EXPLICIT];
  // Maximum number of nodes in a single node pool (autoscaler max)
  int32 max_nodes_per_node_pool = 30 [features.field_presence = EXPLICIT];
  // Default memory request applied to containers via LimitRange (mebibytes)
  int32 default_memory_request_mi = 40 [features.field_presence = EXPLICIT];
  // Default memory limit applied to containers via LimitRange (mebibytes)
  int32 default_memory_limit_mi = 50 [features.field_presence = EXPLICIT];
  // Default CPU request applied to containers via LimitRange (millicores)
  int32 default_cpu_request_m = 60 [features.field_presence = EXPLICIT];
  // Default CPU limit applied to containers via LimitRange (millicores)
  int32 default_cpu_limit_m = 70 [features.field_presence = EXPLICIT];
}

// GetOrganizationLimits request
message GetOrganizationLimitsRequest {
  // ID of the organization
  string id = 10 [(buf.validate.field).string = {uuid: true}];
}

// GetOrganizationLimits response
message GetOrganizationLimitsResponse {
  // The current limits for the organization (absent fields mean no limit is set)
  OrganizationLimits limits = 10;
}

// UpdateOrganizationLimits request
message UpdateOrganizationLimitsRequest {
  // ID of the organization to update
  string id = 10 [(buf.validate.field).string = {uuid: true}];
  // Maximum total number of nodes across all node pools in a shoot cluster
  int32 max_nodes_per_cluster = 20 [
    features.field_presence = EXPLICIT,
    (buf.validate.field).int32 = {gte: 1}
  ];
  // Maximum number of node pools per shoot cluster
  int32 max_node_pools_per_cluster = 30 [
    features.field_presence = EXPLICIT,
    (buf.validate.field).int32 = {gte: 1}
  ];
  // Maximum number of nodes in a single node pool (autoscaler max)
  int32 max_nodes_per_node_pool = 40 [
    features.field_presence = EXPLICIT,
    (buf.validate.field).int32 = {gte: 1}
  ];
  // Default memory request applied to containers via LimitRange (mebibytes)
  int32 default_memory_request_mi = 50 [
    features.field_presence = EXPLICIT,
    (buf.validate.field).int32 = {gte: 1}
  ];
  // Default memory limit applied to containers via LimitRange (mebibytes)
  int32 default_memory_limit_mi = 60 [
    features.field_presence = EXPLICIT,
    (buf.validate.field).int32 = {gte: 1}
  ];
  // Default CPU request applied to containers via LimitRange (millicores)
  int32 default_cpu_request_m = 70 [
    features.field_presence = EXPLICIT,
    (buf.validate.field).int32 = {gte: 1}
  ];
  // Default CPU limit applied to containers via LimitRange (millicores)
  int32 default_cpu_limit_m = 80 [
    features.field_presence = EXPLICIT,
    (buf.validate.field).int32 = {gte: 1}
  ];
}

// UpdateOrganizationLimits response
message UpdateOrganizationLimitsResponse {}

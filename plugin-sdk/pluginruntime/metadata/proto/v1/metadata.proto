edition = "2023";

package pluginmetadata.v1;

option go_package = "github.com/fundament-oss/fundament/plugin-sdk/pluginruntime/metadata/proto/gen/v1;pluginmetadatav1";

message GetStatusRequest {}

message GetStatusResponse {
  string phase = 1;
  string message = 2;
}

message RequestUninstallRequest {}
message RequestUninstallResponse {}

service PluginMetadataService {
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  rpc RequestUninstall(RequestUninstallRequest) returns (RequestUninstallResponse);
}

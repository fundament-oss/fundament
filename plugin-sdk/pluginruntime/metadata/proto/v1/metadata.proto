edition = "2023";

package pluginmetadata.v1;

option go_package = "github.com/fundament-oss/fundament/plugin-sdk/pluginruntime/metadata/proto/gen/v1;pluginmetadatav1";

message GetStatusRequest {}

message GetStatusResponse {
  string phase = 1;
  string message = 2;
  string version = 3;
}

message GetDefinitionRequest {}

message PluginURLs {
  string homepage = 1;
  string repository = 2;
  string documentation = 3;
}

message PolicyRule {
  repeated string api_groups = 1;
  repeated string resources = 2;
  repeated string verbs = 3;
}

message Permissions {
  repeated string capabilities = 1;
  repeated PolicyRule rbac = 2;
}

message MenuEntry {
  string crd = 1;
  bool list = 2;
  bool detail = 3;
  bool create = 4;
  string icon = 5;
}

message MenuDefinition {
  repeated MenuEntry organization = 1;
  repeated MenuEntry project = 2;
}

message ComponentMapping {
  string list = 1;
  string detail = 2;
}

message FormGroup {
  string name = 1;
  repeated string fields = 2;
}

message StatusValue {
  string badge = 1;
  string label = 2;
}

message StatusMapping {
  string json_path = 1;
  map<string, StatusValue> values = 2;
}

message UIHint {
  repeated FormGroup form_groups = 1;
  StatusMapping status_mapping = 2;
}

message GetDefinitionResponse {
  string name = 1;
  string version = 2;
  string description = 3;
  string display_name = 4;
  string author = 5;
  string license = 6;
  string icon = 7;
  PluginURLs urls = 8;
  repeated string tags = 9;
  Permissions permissions = 10;
  MenuDefinition menu = 11;
  map<string, ComponentMapping> custom_components = 12;
  map<string, UIHint> ui_hints = 13;
  repeated string crds = 14;
  string api_version = 15;
}

service PluginMetadataService {
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  rpc GetDefinition(GetDefinitionRequest) returns (GetDefinitionResponse);
}

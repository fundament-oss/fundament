<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demo plugin</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          'Helvetica Neue',
          Arial,
          sans-serif;
        padding: 1.5rem;
        transition:
          background-color 0.2s,
          color 0.2s;
      }

      body.light {
        background: #fff;
        color: #111827;
      }

      body.dark {
        background: #1f2937;
        color: #f9fafb;
      }

      .card {
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
        padding: 1.5rem;
      }

      body.dark .card {
        border-color: #374151;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }

      p {
        font-size: 0.875rem;
        line-height: 1.5;
        opacity: 0.8;
      }
    </style>
  </head>
  <body class="light">
    <div class="card">
      <h1>Hello world</h1>
      <p>This is a demo plugin rendered inside a sandboxed iframe.</p>
    </div>

    <script src="../plugin-sdk.js"></script>
  </body>
</html>

<div class="relative w-full">
  <input
    type="text"
    readonly
    class="date-input"
    [id]="id()"
    [value]="displayValue()"
    placeholder="Select date range"
    [attr.aria-haspopup]="'dialog'"
    [attr.aria-expanded]="open()"
    (click)="toggleOpen()"
  />

  @if (open()) {
    <div
      role="dialog"
      aria-label="Date range picker"
      class="absolute z-50 mt-1 w-72 rounded-lg border border-neutral-200 bg-white p-3 shadow-lg dark:border-neutral-800 dark:bg-gray-950"
    >
      <!-- Month navigation -->
      <div class="mb-2 flex items-center justify-between">
        <button
          type="button"
          class="flex h-8 w-8 items-center justify-center rounded-full text-lg text-neutral-600 hover:bg-neutral-100 dark:text-neutral-300 dark:hover:bg-neutral-800"
          aria-label="Previous month"
          (click)="prevMonth()"
        >
          ‹
        </button>
        <span class="text-sm font-medium text-neutral-900 dark:text-white">{{ monthLabel() }}</span>
        <button
          type="button"
          class="flex h-8 w-8 items-center justify-center rounded-full text-lg text-neutral-600 hover:bg-neutral-100 dark:text-neutral-300 dark:hover:bg-neutral-800"
          aria-label="Next month"
          (click)="nextMonth()"
        >
          ›
        </button>
      </div>

      <!-- Weekday headers -->
      <div class="mb-1 grid grid-cols-7 text-center">
        @for (wd of weekdays; track wd) {
          <span class="py-1 text-xs font-medium text-neutral-500 dark:text-neutral-400">{{
            wd
          }}</span>
        }
      </div>

      <!-- Day grid -->
      <div class="grid grid-cols-7">
        @for (day of weeks(); track day.date) {
          <div class="flex justify-center py-0.5">
            <button
              type="button"
              [class]="dayClass(day)"
              [attr.aria-label]="day.date"
              [attr.aria-pressed]="day.date === dateFrom() || day.date === dateTo()"
              (click)="selectDate(day.date)"
              (mouseenter)="hoverDate.set(day.date)"
              (mouseleave)="hoverDate.set(null)"
            >
              {{ day.label }}
            </button>
          </div>
        }
      </div>
    </div>
  }
</div>

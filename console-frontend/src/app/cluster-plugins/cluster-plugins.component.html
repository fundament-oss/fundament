<div class="card">
  <!-- Header -->
  <div class="card-header">
    <h1 class="text-3xl font-semibold">Cluster plugins</h1>
    <p class="mt-1 text-gray-600 dark:text-gray-300">Configure plugins for cluster 'cluster-1'.</p>
  </div>

  <!-- Form -->
  <div class="px-6 py-6">
    @if (!isClusterRunning()) {
      <div
        class="mb-6 rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 dark:border-amber-900/40 dark:bg-amber-950/30"
      >
        <p class="text-sm text-amber-800 dark:text-amber-200">
          Plugin management is only available when the cluster is running. Current status:
          <span class="font-medium">{{ getStatusLabel(clusterStatus()) }}</span>.
        </p>
      </div>
    }
    @if (errorMessage()) {
      <div
        class="bg-danger-50 dark:bg-danger-950/30 mb-6 flex items-center gap-3 rounded-lg border border-rose-200 px-4 py-3 dark:border-rose-900/40"
      >
        <nldd-icon
          name="dismiss-circle"
          class="text-danger-500! dark:text-danger-400! h-4.5 w-4.5 shrink-0"
        ></nldd-icon>
        <p class="text-danger-700 dark:text-danger-300">{{ errorMessage() }}</p>
      </div>
    }
    <app-shared-plugins-form
      (formSubmit)="onFormSubmit($event)"
      [initialPluginIds]="currentPluginIds()"
    >
      <div class="flex space-x-3">
        <nldd-button
          type="button"
          (click)="onCancel()"
          [disabled]="isSubmitting()"
          text="Cancel"
          variant="secondary"
        ></nldd-button>
        <nldd-button
          type="button"
          (click)="pluginsForm.submit()"
          [text]="isSubmitting() ? 'Saving...' : 'Save changes'"
          [disabled]="isSubmitting() || !isClusterRunning()"
          variant="primary"
        ></nldd-button>
      </div>
    </app-shared-plugins-form>
  </div>
</div>

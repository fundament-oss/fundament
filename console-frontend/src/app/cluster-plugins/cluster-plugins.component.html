<div class="card">
  <!-- Header -->
  <div class="card-header">
    <h1 class="text-2xl font-semibold dark:text-white">Cluster plugins</h1>
    <p class="mt-1 text-sm text-gray-600 dark:text-gray-300">
      Configure plugins for cluster 'cluster-1'.
    </p>
  </div>

  <!-- Form -->
  <div class="px-6 py-6">
    @if (errorMessage()) {
      <div
        class="mb-6 flex items-center gap-3 rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 dark:border-rose-900/40 dark:bg-rose-950/30"
      >
        <ndd-icon name="dismiss-circle" class="h-4.5 w-4.5 shrink-0 text-rose-500! dark:text-rose-400!" />
        <p class="text-sm text-rose-700 dark:text-rose-300">{{ errorMessage() }}</p>
      </div>
    }
    <app-shared-plugins-form
      (formSubmit)="onFormSubmit($event)"
      [initialPluginIds]="currentPluginIds()"
    >
      <div class="flex space-x-3">
        <ndd-button
          type="button"
          (click)="onCancel()"
          [disabled]="isSubmitting()"
          text="Cancel"
          variant="secondary"
          size="sm"
        ></ndd-button>
        <ndd-button
          type="submit"
          [text]="isSubmitting() ? 'Saving...' : 'Save changes'"
          [disabled]="isSubmitting()"
          variant="primary"
          size="sm"
        ></ndd-button>
      </div>
    </app-shared-plugins-form>
  </div>
</div>

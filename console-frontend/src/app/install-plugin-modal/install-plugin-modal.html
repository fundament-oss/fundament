<nldd-modal-dialog
  #dialog
  appDialogSync
  [show]="show()"
  text="Install plugin"
  (open)="onOpen()"
  (close)="onClose()"
>
  <nldd-spacer size="24"></nldd-spacer>

  <p class="mb-4 text-gray-600 dark:text-gray-400">
    Select cluster(s) to install plugin
    <strong class="font-semibold">{{ pluginName() }}</strong> on:
  </p>

  <div class="space-y-2">
    @if (clusters().length === 0) {
      <p class="text-gray-600 dark:text-gray-400">No clusters found</p>
    } @else {
      @for (cluster of clusters(); track cluster.id) {
        <div
          class="flex items-center justify-between rounded-md border border-gray-200 p-3 dark:border-gray-800"
        >
          <span class="font-medium">{{ cluster.name }}</span>
          @if (cluster.installed) {
            <span
              class="inline-flex items-center rounded-full bg-emerald-100 px-2.5 py-1 text-sm font-medium text-emerald-800 dark:bg-emerald-900 dark:text-emerald-200"
            >
              <nldd-icon name="check-mark" class="mr-1 h-3 w-3"></nldd-icon> Installed
            </span>
          } @else if (!cluster.running) {
            <span class="badge badge-sm badge-gray">Not running</span>
          } @else {
            <nldd-button
              type="button"
              (click)="onInstall(cluster.id)"
              text="Install"
              variant="primary"
              size="xs"
            ></nldd-button>
          }
        </div>
      }
    }
  </div>

  <nldd-button
    slot="actions"
    type="button"
    (click)="onClose()"
    text="Close"
    variant="secondary"
  ></nldd-button>
</nldd-modal-dialog>

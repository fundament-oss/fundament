apiVersion: fundament.io/v1
kind: PluginDefinition
name: demo
alias: Demo plugin
version: v0.1.0
description: Demonstration plugin with custom iframe UI
menu:
  organization:
    - crd: DemoItem
      icon: tablerInfoHexagon
crds:
  - |
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: demoitems.demo.fundament.io
    spec:
      group: demo.fundament.io
      names:
        kind: DemoItem
        plural: demoitems
        singular: demoitem
      scope: Namespaced
      versions:
        - name: v1
          served: true
          storage: true
          schema:
            openAPIV3Schema:
              type: object
              properties:
                spec:
                  type: object
                  properties:
                    message:
                      type: string
                      description: A greeting message
customUI:
  DemoItem:
    list: /plugin-ui/demo/list.html

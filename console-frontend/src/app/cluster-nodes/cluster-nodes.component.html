<div class="card">
  <!-- Header -->
  <div class="card-header">
    <h1 class="text-2xl font-semibold dark:text-white">Cluster worker nodes</h1>
    <p class="mt-1 text-sm text-gray-600 dark:text-gray-300">
      Configure worker nodes for cluster '{{ clusterName() }}'.
    </p>
  </div>

  <!-- Form -->
  <div class="px-6 py-6">
    @if (errorMessage()) {
      <div
        class="mb-6 flex items-center gap-3 rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 dark:border-rose-900/40 dark:bg-rose-950/30"
      >
        <ng-icon
          name="tablerCircleXFill"
          class="shrink-0 text-rose-500! dark:text-rose-400!"
          size="1.125rem"
        />
        <p class="text-sm text-rose-700 dark:text-rose-300">{{ errorMessage() }}</p>
      </div>
    }
    @if (isLoading()) {
      <div class="flex items-center justify-center py-8">
        <p class="text-sm text-gray-500 dark:text-gray-400">Loading node pools...</p>
      </div>
    } @else {
      <app-shared-node-pools-form
        [initialData]="initialNodePools()"
        (formSubmit)="onFormSubmit($event)"
      >
        <div class="flex space-x-3">
          <button
            type="button"
            (click)="onCancel()"
            class="btn-secondary"
            [disabled]="isSubmitting()"
          >
            Cancel
          </button>
          <button type="submit" class="btn-primary" [disabled]="isSubmitting()">
            @if (isSubmitting()) {
              Saving...
            } @else {
              Save changes
            }
          </button>
        </div>
      </app-shared-node-pools-form>
    }
  </div>
</div>

<div class="card">
  <!-- Header -->
  <div class="card-header">
    <h1 class="text-3xl font-semibold dark:text-white">Cluster worker nodes</h1>
    <p class="mt-1 text-gray-600 dark:text-gray-300">
      Configure worker nodes for cluster 'cluster-1'.
    </p>
  </div>

  <!-- Form -->
  <div class="px-6 py-6">
    @if (errorMessage()) {
      <div
        class="bg-danger-50 dark:bg-danger-950/30 mb-6 flex items-center gap-3 rounded-lg border border-rose-200 px-4 py-3 dark:border-rose-900/40"
      >
        <nldd-icon
          name="dismiss-circle"
          class="text-danger-500! dark:text-danger-400! h-4.5 w-4.5 shrink-0"
        ></nldd-icon>
        <p class="text-danger-700 dark:text-danger-300">{{ errorMessage() }}</p>
      </div>
    }
    @if (isLoading()) {
      <div class="flex items-center justify-center py-8">
        <p class="text-gray-500 dark:text-gray-400">Loading node pools...</p>
      </div>
    } @else {
      <app-shared-node-pools-form
        [initialData]="initialNodePools()"
        (formSubmit)="onFormSubmit($event)"
      >
        <div class="flex space-x-3">
          <nldd-button
            type="button"
            (click)="onCancel()"
            [disabled]="isSubmitting()"
            text="Cancel"
            variant="secondary"
          ></nldd-button>
          <nldd-button
            type="button"
            (click)="nodePoolsForm.submit()"
            [text]="isSubmitting() ? 'Saving...' : 'Save changes'"
            [disabled]="isSubmitting()"
            variant="primary"
          ></nldd-button>
        </div>
      </app-shared-node-pools-form>
    }
  </div>
</div>

<!-- Header -->
<div class="card-header">
  <h1 class="text-3xl font-semibold dark:text-white">Add cluster plugins</h1>
  <p class="mt-1 text-gray-600 dark:text-gray-300">
    Configure your cluster plugins or presets with the settings below.
    <a routerLink="/clusters/add/summary" class="link inline-flex items-center"
      >Skip this step <ndd-icon name="arrow-right" class="ml-0.5 h-4 w-4"></ndd-icon
    ></a>
  </p>
</div>

<!-- Form -->
<div class="card-body-lg">
  <app-shared-plugins-form (formSubmit)="onFormSubmit($event)">
    <div class="flex space-x-3">
      <ndd-button routerLink="/clusters/add/nodes" text="Previous step" variant="secondary" ></ndd-button>
      <ndd-button type="button" (click)="pluginsForm.submit()" text="Next step" variant="primary" ></ndd-button>
    </div>
  </app-shared-plugins-form>
</div>

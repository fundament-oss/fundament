<!-- Header -->
<div class="card-header">
  <h1 class="text-2xl font-semibold dark:text-white">Add cluster plugins</h1>
  <p class="mt-1 text-sm text-gray-600 dark:text-gray-300">
    Configure your cluster plugins or presets with the settings below.
    <a routerLink="/clusters/add/summary" class="link inline-flex items-center"
      >Skip this step <ndd-icon name="arrow-right" class="ml-0.5"></ndd-icon
    ></a>
  </p>
</div>

<!-- Form -->
<div class="card-body-lg">
  <app-shared-plugins-form (formSubmit)="onFormSubmit($event)">
    <div class="flex space-x-3">
      <a routerLink="/clusters/add/nodes" class="btn-secondary"> Previous step </a>
      <button type="submit" class="btn-primary">Next step</button>
    </div>
  </app-shared-plugins-form>
</div>

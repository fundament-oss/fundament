<form [formGroup]="nodePoolsForm" (ngSubmit)="onSubmit()" class="space-y-6">
  <!-- Node Pools -->
  <div formArrayName="nodePools" class="space-y-6">
    @for (nodePoolControl of nodePools.controls; track nodePoolControl) {
      @let nameControl = nodePoolControl.get('name');
      <div
        [formGroupName]="$index"
        class="rounded-lg border border-gray-200 bg-gray-50 p-4 dark:border-gray-800 dark:bg-gray-900"
      >
        <div class="mb-4 flex items-center justify-between">
          <h3 class="text-lg font-medium dark:text-white">Node pool {{ $index + 1 }}</h3>
          @if (nodePools.length > 1) {
            <ndd-button
              type="button"
              (click)="removeNodePool($index)"
              text="Remove"
              start-icon="trash"
              size="sm"
              variant="destructive"
            ></ndd-button>
          }
        </div>

        <div class="space-y-4">
          <!-- Node Pool Name -->
          <ndd-form-field label="Node pool name">
            <ndd-text-field
              [id]="'nodePoolName-' + $index"
              [value]="nameControl?.value ?? ''"
              [appAutofocus]="$first"
              placeholder="E.g. my-pool-name"
              [invalid]="!!(nameControl?.invalid && nameControl?.dirty)"
              [attr.error-message]="'node-pool-name-error-' + $index"
              (input)="onNodePoolNameInput($index, $event)"
            />
            <ndd-form-field-error-text [id]="'node-pool-name-error-' + $index">
              {{ getNodePoolNameError($index) }}
            </ndd-form-field-error-text>
          </ndd-form-field>

          <!-- Machine Type -->
          <ndd-form-field label="Machine type">
            <select [id]="'machineType-' + $index" formControlName="machineType">
              @for (mt of machineTypes; track mt.value) {
                <option [value]="mt.value">{{ mt.label }}</option>
              }
            </select>
          </ndd-form-field>

          <!-- Autoscaling -->
          <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
            <ndd-form-field label="Autoscale minimum">
              <ndd-number-field
                [id]="'autoscaleMin-' + $index"
                [value]="nodePoolControl.get('autoscaleMin')?.value"
                (input)="nodePoolControl.get('autoscaleMin')?.setValue($any($event).detail.value)"
                min="1"
                max="100"
                step="1"
              ></ndd-number-field>
            </ndd-form-field>

            <ndd-form-field label="Autoscale maximum">
              <ndd-number-field
                [id]="'autoscaleMax-' + $index"
                [value]="nodePoolControl.get('autoscaleMax')?.value"
                (input)="nodePoolControl.get('autoscaleMax')?.setValue($any($event).detail.value)"
                min="1"
                max="100"
                step="1"
              ></ndd-number-field>
            </ndd-form-field>
          </div>
        </div>
      </div>
    }
  </div>

  <ndd-button
    type="button"
    (click)="addNodePool()"
    text="Add another node pool"
    start-icon="plus-small"
    variant="accent-outlined"
  ></ndd-button>

  <!-- Form Actions slot -->
  <div class="border-t border-gray-200 pt-6 dark:border-gray-800">
    <ng-content></ng-content>
  </div>
</form>

<!-- Overheid-themed login form -->
<div class="flex min-h-[calc(100vh-7.0625rem)] flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <h2 class="mb-6 text-center text-3xl font-bold">Log in</h2>
    <p class="mb-8 text-center text-gray-600 dark:text-gray-300">
      Please enter your credentials to continue.
    </p>
  </div>

  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <div
      class="rounded-lg border border-gray-200 bg-white px-4 py-8 sm:px-10 dark:border-gray-800 dark:bg-gray-950"
    >
      <form
        [formGroup]="loginForm"
        class="space-y-6"
        (ngSubmit)="onSubmit()"
        (keydown.enter)="onSubmit()"
      >
        <ndd-form-field label="Email address">
          <ndd-text-field
            type="email"
            id="email"
            placeholder="Enter your email address"
            autocomplete="email"
            appAutofocus
            [value]="email?.value ?? ''"
            (input)="loginForm.get('email')!.setValue($any($event.target).value)"
            (blur)="loginForm.get('email')!.markAsTouched()"
            [invalid]="!!(email?.invalid && email?.touched)"
            error-message="login-email-error"
          ></ndd-text-field>
          <ndd-form-field-error-text id="login-email-error">
            {{ getEmailError() }}
          </ndd-form-field-error-text>
        </ndd-form-field>

        <ndd-form-field label="Password">
          <ndd-password-field
            id="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            [value]="password?.value ?? ''"
            (input)="loginForm.get('password')!.setValue($any($event.target).value)"
            (blur)="loginForm.get('password')!.markAsTouched()"
            show-text="Show"
            show-accessible-label="Show password"
            hide-text="Hide"
            hide-accessible-label="Hide password"
            [invalid]="!!(password?.invalid && password?.dirty)"
            error-message="login-password-error"
          ></ndd-password-field>
          <ndd-form-field-error-text id="login-password-error">
            {{ getPasswordError() }}
          </ndd-form-field-error-text>
        </ndd-form-field>

        @if (error()) {
          <div class="rounded-md bg-red-50 p-3 dark:bg-red-900/20">
            <p class="text-red-800 dark:text-red-200">{{ error() }}</p>
          </div>
        }

        <ndd-button
          variant="accent-filled"
          full-width
          [attr.disabled]="isLoading() ? '' : null"
          text="Sign in"
          [text]="isLoading() ? 'Signing in...' : 'Sign in'"
          type="submit"
          (click)="onSubmit()"
        ></ndd-button>
      </form>
    </div>
  </div>
</div>

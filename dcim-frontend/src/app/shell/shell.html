<!-- Identity strip (lintblauw) + topbar wrapped as single sticky unit -->
<div class="sticky top-0 z-40">
  <div class="h-1 bg-accent-750" aria-hidden="true"></div>

  <header
    class="flex h-16 bg-white border-b border-slate-200 dark:bg-gray-900 dark:border-gray-800"
    role="banner"
  >
    <!-- Brand -->
    <div class="flex items-center px-6 border-r border-slate-200 shrink-0 dark:border-gray-800">
      <a
        routerLink="/"
        aria-label="Fundament DCIM home"
        class="flex items-center leading-tight gap-2"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5.5 w-5.5 text-indigo-600 dark:text-indigo-400"
          viewBox="0 0 24 24"
        >
          <path
            fill="currentColor"
            d="M6 5h12a1 1 0 0 1 1 1a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1a1 1 0 0 1 1-1m15-3v2H3V2zm-6 6h2v14h-2zM7 8h2v14H7zm4 0h2v14h-2z"
          />
        </svg>
        <span class="font-semibold tracking-tight text-slate-900 dark:text-gray-100">
          Fundament <span class="text-slate-400 font-normal ml-0.5">DCIM</span>
        </span>
      </a>
    </div>

    <!-- Primary navigation -->
    <nav class="flex flex-1 items-stretch pl-1" aria-label="Main navigation">
      <a
        routerLink="/catalog"
        routerLinkActive
        #catalogLink="routerLinkActive"
        class="inline-flex items-center gap-2 px-4 text-sm border-b-[3px] transition-colors"
        [class]="
          catalogLink.isActive
            ? 'text-slate-900 font-medium border-accent-600 dark:text-gray-100'
            : 'text-slate-500 border-transparent hover:text-slate-900 dark:text-slate-400 dark:hover:text-gray-100'
        "
      >
        <nldd-icon name="folder-stack" class="w-4.5 h-4.5" aria-hidden="true"></nldd-icon>
        Catalog
      </a>

      <a
        routerLink="/inventory"
        routerLinkActive
        #inventoryLink="routerLinkActive"
        class="inline-flex items-center gap-2 px-4 text-sm border-b-[3px] transition-colors"
        [class]="
          inventoryLink.isActive
            ? 'text-slate-900 font-medium border-accent-600 dark:text-gray-100'
            : 'text-slate-500 border-transparent hover:text-slate-900 dark:text-slate-400 dark:hover:text-gray-100'
        "
      >
        <nldd-icon name="rectangle-stack" class="w-4.5 h-4.5" aria-hidden="true"></nldd-icon>
        Inventory
      </a>

      <a
        routerLink="/datacenters"
        routerLinkActive
        #dcLink="routerLinkActive"
        class="inline-flex items-center gap-2 px-4 text-sm border-b-[3px] transition-colors"
        [class]="
          dcLink.isActive
            ? 'text-slate-900 font-medium border-accent-600 dark:text-gray-100'
            : 'text-slate-500 border-transparent hover:text-slate-900 dark:text-slate-400 dark:hover:text-gray-100'
        "
      >
        <nldd-icon name="apartment-building" class="w-4.5 h-4.5" aria-hidden="true"></nldd-icon>
        Data centers
      </a>

      <a
        routerLink="/racks"
        routerLinkActive
        #racksLink="routerLinkActive"
        class="inline-flex items-center gap-2 px-4 text-sm border-b-[3px] transition-colors"
        [class]="
          racksLink.isActive
            ? 'text-slate-900 font-medium border-accent-600 dark:text-gray-100'
            : 'text-slate-500 border-transparent hover:text-slate-900 dark:text-slate-400 dark:hover:text-gray-100'
        "
      >
        <nldd-icon name="cylinder-split" class="w-4.5 h-4.5" aria-hidden="true"></nldd-icon>
        Racks
      </a>

      <a
        routerLink="/patch-mapping"
        routerLinkActive
        #patchLink="routerLinkActive"
        class="inline-flex items-center gap-2 px-4 text-sm border-b-[3px] transition-colors"
        [class]="
          patchLink.isActive
            ? 'text-slate-900 font-medium border-accent-600 dark:text-gray-100'
            : 'text-slate-500 border-transparent hover:text-slate-900 dark:text-slate-400 dark:hover:text-gray-100'
        "
      >
        <nldd-icon name="list" class="w-4.5 h-4.5" aria-hidden="true"></nldd-icon>
        Patch mapping
      </a>

      <a
        routerLink="/task-management-admin"
        routerLinkActive
        #tasksLink="routerLinkActive"
        class="inline-flex items-center gap-2 px-4 text-sm border-b-[3px] transition-colors"
        [class]="
          tasksLink.isActive
            ? 'text-slate-900 font-medium border-accent-600 dark:text-gray-100'
            : 'text-slate-500 border-transparent hover:text-slate-900 dark:text-slate-400 dark:hover:text-gray-100'
        "
      >
        <nldd-icon name="check-mark-circle" class="w-4.5 h-4.5" aria-hidden="true"></nldd-icon>
        Tasks
      </a>
    </nav>

    <!-- User section -->
    <div
      class="flex items-center gap-3 px-6 border-l border-slate-200 shrink-0 dark:border-gray-800"
    >
      <app-theme-toggle />

      <div class="user-dropdown relative">
        <button
          type="button"
          (click)="toggleUserDropdown()"
          [attr.aria-expanded]="userDropdownOpen()"
          aria-haspopup="menu"
          aria-label="User menu"
          class="flex items-center gap-3 rounded-md cursor-pointer focus:ring-2 focus:ring-accent-500 focus:ring-offset-2 focus:outline-none dark:focus:ring-offset-gray-950"
        >
          <div class="text-right hidden sm:block">
            <div class="text-sm text-slate-900 dark:text-gray-100">{{ userName() }}</div>
          </div>

          <div
            class="h-8 w-8 rounded-full bg-[#154273] flex items-center justify-center text-white text-xs font-medium select-none shrink-0"
            [attr.aria-label]="'User avatar: ' + userName()"
            role="img"
          >
            {{ userInitials() }}
          </div>
        </button>

        @if (userDropdownOpen()) {
          <div
            class="absolute right-0 z-10 mt-2 w-52 rounded-lg border border-slate-200 bg-white py-1 shadow-md dark:border-gray-800 dark:bg-gray-950"
            role="menu"
          >
            <div class="border-b border-slate-100 px-4 py-2.5 dark:border-gray-800">
              <p class="text-sm text-slate-500 dark:text-gray-400">Logged in as</p>
              <p class="mt-1 truncate font-medium text-slate-700 dark:text-gray-200">
                {{ userName() || 'Unknown' }}
              </p>
            </div>
            <div class="pt-1">
              <button
                type="button"
                role="menuitem"
                (click)="handleLogout()"
                class="block w-full cursor-pointer px-4 py-2 text-left text-slate-600 hover:bg-slate-50 hover:text-slate-900 dark:text-gray-300 dark:hover:bg-gray-900 dark:hover:text-white"
              >
                Log out
              </button>
            </div>
          </div>
        }
      </div>
    </div>
  </header>
</div>

<router-outlet />

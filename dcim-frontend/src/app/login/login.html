<div class="flex min-h-screen flex-col bg-neutral-25">
  <!-- Identity strip (lintblauw) + simplified header: just brand and theme switcher -->
  <div class="sticky top-0 z-40">
    <div class="h-1 bg-accent-750" aria-hidden="true"></div>
    <header
      class="flex h-16 items-center justify-between border-b border-slate-200 bg-white px-6 dark:border-gray-800 dark:bg-gray-900"
      role="banner"
    >
      <div class="flex items-center gap-2 leading-tight">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5.5 w-5.5 text-indigo-600 dark:text-indigo-400"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path
            fill="currentColor"
            d="M6 5h12a1 1 0 0 1 1 1a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1a1 1 0 0 1 1-1m15-3v2H3V2zm-6 6h2v14h-2zM7 8h2v14H7zm4 0h2v14h-2z"
          />
        </svg>
        <span class="font-semibold tracking-tight text-slate-900 dark:text-gray-100">
          Fundament <span class="ml-0.5 font-normal text-slate-400">DCIM</span>
        </span>
      </div>
      <app-theme-toggle />
    </header>
  </div>

  <div class="flex flex-1 flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
      <h2 class="mb-6 text-center text-3xl font-bold">Log in to DCIM</h2>
      <p class="mb-8 text-center text-gray-600 dark:text-gray-300">
        Please enter your credentials to continue.
      </p>
    </div>
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
      <div
        class="rounded-lg border border-gray-200 bg-white px-4 py-8 sm:px-10 dark:border-gray-800 dark:bg-gray-900"
      >
        <form
          [formGroup]="loginForm"
          class="space-y-6"
          (ngSubmit)="onSubmit()"
          (keydown.enter)="onSubmit()"
        >
          <nldd-form-field label="Email address">
            <nldd-text-field
              type="email"
              id="email"
              placeholder="Enter your email address"
              autocomplete="email"
              appAutofocus
              [value]="email?.value ?? ''"
              (input)="loginForm.get('email')!.setValue($any($event.target).value)"
              (blur)="loginForm.get('email')!.markAsTouched()"
              [invalid]="!!(email?.invalid && email?.touched)"
              error-message="login-email-error"
            ></nldd-text-field>
            <nldd-form-field-error-text id="login-email-error">
              {{ getEmailError() }}
            </nldd-form-field-error-text>
          </nldd-form-field>

          <nldd-form-field label="Password">
            <nldd-password-field
              id="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              [value]="password?.value ?? ''"
              (input)="loginForm.get('password')!.setValue($any($event.target).value)"
              (blur)="loginForm.get('password')!.markAsTouched()"
              show-text="Show"
              show-accessible-label="Show password"
              hide-text="Hide"
              hide-accessible-label="Hide password"
              [invalid]="!!(password?.invalid && password?.dirty)"
              error-message="login-password-error"
            ></nldd-password-field>
            <nldd-form-field-error-text id="login-password-error">
              {{ getPasswordError() }}
            </nldd-form-field-error-text>
          </nldd-form-field>

          @if (error()) {
            <div class="rounded-md bg-red-50 p-3 dark:bg-red-900/20">
              <p class="text-red-800 dark:text-red-200">{{ error() }}</p>
            </div>
          }

          <nldd-button
            variant="primary"
            full-width
            [attr.disabled]="isLoading() ? '' : null"
            [text]="isLoading() ? 'Signing in...' : 'Sign in'"
            type="submit"
            (click)="onSubmit()"
          ></nldd-button>
        </form>
      </div>
    </div>
  </div>
</div>

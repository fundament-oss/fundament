{{- if and .Values.https.enabled (not .Values.https.existingSecret.name) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "open-fsc-outway.fullname" . }}-tls-server
  labels:
    {{- include "open-fsc-outway.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.key: {{ (required "HTTPS server key PEM is required" .Values.https.keyPEM) | b64enc }}
  tls.crt: {{ (required "HTTPS server certificate PEM is required" .Values.https.certificatePEM) | b64enc }}
{{- end }}

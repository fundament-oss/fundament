---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: directories.openfsc.fundament.io
spec:
  group: openfsc.fundament.io
  names:
    kind: Directory
    listKind: DirectoryList
    plural: directories
    shortNames:
    - directory
    singular: directory
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.groupID
      name: Group
      type: string
    - jsonPath: .spec.namespace
      name: Namespace
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          Directory deploys a self-contained OpenFSC directory peer (cluster-scoped).
          The operator installs the OpenFSC core into spec.namespace and seeds the
          "self" Peer representing it.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              DirectorySpec declares a self-contained OpenFSC directory peer: the operator
              installs the OpenFSC umbrella (Manager + Controller + auditlog + txlog-api),
              a self-signed group CA with the Manager's group certificate, and a
              CloudNativePG cluster backing the components.
            properties:
              autoSignGrants:
                default:
                - servicePublication
                - delegatedServicePublication
                description: AutoSignGrants lists the grant types the Manager signs
                  automatically.
                items:
                  type: string
                type: array
              controllerURL:
                description: |-
                  ControllerURL is the host-reachable URL of the Controller UI, surfaced in
                  the Directory and self-Peer status so a console can link to it. Empty hides
                  the link.
                type: string
              groupID:
                default: fsc-demo
                description: GroupID is the FSC group this directory serves.
                type: string
              namespace:
                default: fsc
                description: Namespace is where the OpenFSC components are installed.
                type: string
              peerID:
                default: "12345678901234567899"
                description: |-
                  PeerID is the directory peer's identifier within the group, carried as the
                  subject serialNumber on the Manager's group certificate.
                type: string
              postgres:
                default: {}
                description: |-
                  Postgres configures the CloudNativePG cluster backing the components.
                  The default {} makes the nested field defaults apply when omitted.
                properties:
                  image:
                    default: ghcr.io/cloudnative-pg/postgresql:16
                    description: Image is the PostgreSQL container image.
                    type: string
                  instances:
                    default: 1
                    description: Instances is the number of PostgreSQL instances.
                    format: int32
                    type: integer
                  storageClass:
                    default: basic-csi
                    description: StorageClass is the StorageClass for the data volumes.
                    type: string
                  storageSize:
                    default: 1Gi
                    description: StorageSize is the size of each data volume.
                    type: string
                type: object
            type: object
          status:
            description: DirectoryStatus is the observed state of a Directory.
            properties:
              conditions:
                description: |-
                  Conditions follow the standard Kubernetes condition convention. The
                  operator reports Ready and PrerequisitesMet.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              controllerURL:
                description: |-
                  ControllerURL is the OpenFSC Controller UI address (copied from the spec
                  once the directory is deployed).
                type: string
              message:
                description: Message is a human-readable status detail.
                type: string
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation last reconciled.
                format: int64
                type: integer
              phase:
                description: Phase is the high-level reconciliation state.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

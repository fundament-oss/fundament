apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openfsc-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openfsc-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "openfsc-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openfsc-operator.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "openfsc-operator.fullname" . }}
      volumes:
        - name: tmp
          emptyDir: {}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: LEADER_ELECT
              value: {{ .Values.leaderElect | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            # cli-runtime's discovery cache writes under $HOME/.kube/cache; the
            # root filesystem is read-only, so point HOME at the tmp volume.
            - name: HOME
              value: /tmp
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          # Local-dev image builds + first-run pulls from the k3d registry can
          # take many minutes before the operator answers /livez. Gate liveness
          # and readiness behind a startupProbe that gives it up to 15 minutes;
          # in production the container comes up in seconds and this exits
          # immediately, so it's effectively a no-op.
          startupProbe:
            httpGet:
              path: /livez
              port: health
            periodSeconds: 10
            failureThreshold: 90
          livenessProbe:
            httpGet:
              path: /livez
              port: health
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

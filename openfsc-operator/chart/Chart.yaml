apiVersion: v2
name: openfsc-operator
description: >-
  Kubernetes operator for OpenFSC (Federated Service Connectivity, the Dutch
  government FSC standard). Owns the cluster-scoped openfsc.fundament.io CRDs:
  Directory deploys a self-contained OpenFSC directory peer (Manager +
  Controller + auditlog + txlog-api), Peer tracks group membership, and
  Inway/Outway provision FSC gateways one Helm release per resource.
  Prerequisites (not installed by this chart): cert-manager and CloudNativePG.
type: application
version: 0.1.0
appVersion: "1.43.0"

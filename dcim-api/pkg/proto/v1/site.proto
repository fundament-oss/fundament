edition = "2023";

package dcim.v1;

import "buf/validate/validate.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/go_features.proto";
import "google/protobuf/timestamp.proto";

option features.(pb.go).api_level = API_OPAQUE;
option features.field_presence = IMPLICIT;
option go_package = "github.com/fundament-oss/fundament/dcim-api/pkg/proto/gen/v1;dcimv1";

// Site is a physical data center location (core.sites).
message Site {
  string                    id          = 10;
  string                    name        = 20;
  string                    full_name   = 30;
  string                    address     = 40;
  string                    city        = 50;
  string                    country     = 60;
  string                    tier        = 70  [features.field_presence = EXPLICIT];
  double                    floor_sqm   = 80  [features.field_presence = EXPLICIT];
  google.protobuf.Timestamp established = 90  [features.field_presence = EXPLICIT];
  string                    status      = 100;
  google.protobuf.Timestamp created     = 110;
  google.protobuf.Timestamp deleted     = 120 [features.field_presence = EXPLICIT];
}

// ── SiteService ───────────────────────────────────────────────────────────────

service SiteService {
  rpc ListSites (ListSitesRequest)  returns (ListSitesResponse);
  rpc GetSite   (GetSiteRequest)    returns (GetSiteResponse);
  rpc CreateSite(CreateSiteRequest) returns (CreateSiteResponse);
  rpc UpdateSite(UpdateSiteRequest) returns (google.protobuf.Empty);
  rpc DeleteSite(DeleteSiteRequest) returns (google.protobuf.Empty);
}

message ListSitesRequest {}

message ListSitesResponse {
  repeated Site sites = 10;
}

message GetSiteRequest {
  string id = 10 [(buf.validate.field).string = {uuid: true}];
}

message GetSiteResponse {
  Site site = 10;
}

message CreateSiteRequest {
  string                    name        = 10 [(buf.validate.field).string.min_len = 1];
  string                    full_name   = 20;
  string                    address     = 30 [features.field_presence = EXPLICIT];
  string                    city        = 40;
  string                    country     = 50;
  string                    tier        = 60;
  double                    floor_sqm   = 70;
  google.protobuf.Timestamp established = 80;
  string                    status      = 90;
}

message CreateSiteResponse {
  string site_id = 10;
}

message UpdateSiteRequest {
  string                    id          = 10 [(buf.validate.field).string = {uuid: true}];
  string                    name        = 20 [features.field_presence = EXPLICIT];
  string                    full_name   = 30 [features.field_presence = EXPLICIT];
  string                    address     = 40 [features.field_presence = EXPLICIT];
  string                    city        = 50 [features.field_presence = EXPLICIT];
  string                    country     = 60 [features.field_presence = EXPLICIT];
  string                    tier        = 70 [features.field_presence = EXPLICIT];
  double                    floor_sqm   = 80 [features.field_presence = EXPLICIT];
  google.protobuf.Timestamp established = 90 [features.field_presence = EXPLICIT];
  string                    status      = 100 [features.field_presence = EXPLICIT];
}

message DeleteSiteRequest {
  string id = 10 [(buf.validate.field).string = {uuid: true}];
}

edition = "2023";

package dcim.v1;

option features.(pb.go).api_level = API_OPAQUE;
option features.field_presence = IMPLICIT;
option go_package = "github.com/fundament-oss/fundament/dcim-api/pkg/proto/gen/v1;dcimv1";

import "google/protobuf/go_features.proto";

// ── Messages ──────────────────────────────────────────────────────────────────

// User is a member of the DCIM staff directory that tasks can be assigned to.
message User {
  string id    = 10;
  string name  = 20;
  string email = 30 [features.field_presence = EXPLICIT];
}

// ── UserService ───────────────────────────────────────────────────────────────

// UserService exposes the read-only DCIM staff directory.
service UserService {
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
}

message ListUsersRequest {}

message ListUsersResponse {
  repeated User users = 10;
}

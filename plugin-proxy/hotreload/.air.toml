root = "/src"
tmp_dir = "tmp"

[build]
cmd = "go build -o tmp/fun-plugin-proxy ./plugin-proxy/cmd/fun-plugin-proxy"
entrypoint = "tmp/fun-plugin-proxy"
include_ext = ["go", "mod", "sum"]
include_dir = ["plugin-proxy", "plugin-controller", "common"]
exclude_dir = ["tmp"]
delay = 500

[log]
time = false

[misc]
clean_on_exit = true

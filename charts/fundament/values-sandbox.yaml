jwtSecretRef:
  name: fundament-jwt
  key: secret

externalUrls:
  authn: https://authn.fundament.projects.digilab.network
  organization: https://organization.fundament.projects.digilab.network
  kubeApiProxy: https://k8s-api.fundament.projects.digilab.network
  console: https://console.fundament.projects.digilab.network
  docs: https://docs.fundament.projects.digilab.network
  cookieDomain: fundament.projects.digilab.network
  corsAllowedOrigins: "https://console.fundament.projects.digilab.network"

db:
  enabled: true
  instances: 1
  reset: false
  storageSize: 5Gi
  insertTestData: true

authnApi:
  enabled: true
  replicas: 1

kubeApiProxy:
  enabled: true
  replicas: 1
  logLevel: info
  mode: mock

organizationApi:
  enabled: true
  replicas: 1

consoleFrontend:
  enabled: true
  replicas: 1

docsFrontend:
  enabled: true
  replicas: 1

dex:
  enabled: true
  issuer: https://dex.projects.digilab.network
  discoveryUrl: http://dex:5556
  staticClients:
    - id: fundament
      name: Fundament
      redirectURIs:
        - https://fundament.projects.digilab.network/callback

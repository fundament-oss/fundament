{{- if $.Values.dcimFrontend.httproute.enabled }}
{{- if not $.Values.dcimFrontend.httproute.parentRefs }}{{ fail "dcimFrontend.httproute.parentRefs is required when httproute is enabled" }}{{ end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $.Release.Name }}-dcim-frontend
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "dcim-frontend" "component" "gateway") | nindent 4 }}
  {{- with $.Values.dcimFrontend.httproute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml $.Values.dcimFrontend.httproute.parentRefs | nindent 4 }}
  hostnames:
    {{- toYaml $.Values.dcimFrontend.httproute.hostnames | nindent 4 }}
  rules:
    - backendRefs:
        - name: dcim-frontend
          port: 80
{{- end }}

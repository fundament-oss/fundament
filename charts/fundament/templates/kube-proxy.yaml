{{- if $.Values.kubeProxy.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-proxy
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "kube-proxy" "component" "backend") | nindent 4 }}
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: {{ $.Values.kubeProxy.replicas }}
  selector:
    matchLabels:
      {{- include "fundament.selectorLabels" (dict "root" $ "name" "kube-proxy") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fundament.labels" (dict "root" $ "name" "kube-proxy" "component" "backend") | nindent 8 }}
    spec:
      containers:
        - name: kube-proxy
          image: {{ $.Values.images.kubeProxy }}
          ports:
            - name: http
              containerPort: 8081
          env:
            {{- include "fundament.jwtSecretEnv" . | nindent 12 }}
            - name: LOG_LEVEL
              value: {{ .Values.kubeProxy.logLevel }}
            {{- if $.Values.externalUrls.corsAllowedOrigins }}
            - name: CORS_ALLOWED_ORIGINS
              value: {{ $.Values.externalUrls.corsAllowedOrigins }}
            {{- end }}
            - name: KUBE_PROXY_MODE
              value: {{ .Values.kubeProxy.mode | default "mock" }}
            {{- if .Values.kubeProxy.kubeProxyKubeconfig }}
            - name: KUBE_PROXY_KUBECONFIG
              value: {{ .Values.kubeProxy.kubeProxyKubeconfig }}
            {{- end }}
            {{- if $.Values.openfga.enabled }}
            - name: OPENFGA_API_URL
              value: http://openfga:{{ $.Values.openfga.apiPort | default 8080 }}
            - name: OPENFGA_STORE_ID
              valueFrom:
                configMapKeyRef:
                  name: openfga-config
                  key: store-id
            - name: OPENFGA_AUTHORIZATION_MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: openfga-config
                  key: authorization-model-id
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: kube-proxy
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "kube-proxy" "component" "backend") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: http
      name: http
  selector:
    {{- include "fundament.selectorLabels" (dict "root" $ "name" "kube-proxy") | nindent 4 }}

{{- if $.Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kube-proxy
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "kube-proxy" "component" "backend") | nindent 4 }}
  annotations:
    {{- if $.Values.ingress.tls.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ $.Values.ingress.tls.clusterIssuer }}
    {{- end }}
spec:
  ingressClassName: {{ $.Values.ingress.className }}
  {{- if $.Values.ingress.tls.clusterIssuer }}
  tls:
    - hosts:
        - organization.{{ include "fundament.ingress.infix" . }}{{ $.Values.ingress.domain }}
      secretName: kube-proxy-tls
  {{- end }}
  rules:
    - host: organization.{{ include "fundament.ingress.infix" . }}{{ $.Values.ingress.domain }}
      http:
        paths:
          - path: /k8sproxy/
            pathType: Prefix
            backend:
              service:
                name: kube-proxy
                port:
                  name: http
{{- end }}

{{- end }}

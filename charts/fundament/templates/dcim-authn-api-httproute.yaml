{{- if $.Values.dcimAuthnApi.httproute.enabled }}
{{- if not $.Values.dcimAuthnApi.httproute.parentRefs }}{{ fail "dcimAuthnApi.httproute.parentRefs is required when httproute is enabled" }}{{ end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $.Release.Name }}-dcim-authn-api
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "dcim-authn-api" "component" "gateway") | nindent 4 }}
spec:
  parentRefs:
    {{- toYaml $.Values.dcimAuthnApi.httproute.parentRefs | nindent 4 }}
  hostnames:
    {{- toYaml $.Values.dcimAuthnApi.httproute.hostnames | nindent 4 }}
  rules:
    - backendRefs:
        - name: dcim-authn-api
          port: 8080
{{- end }}

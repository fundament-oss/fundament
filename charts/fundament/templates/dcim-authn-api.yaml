{{- if $.Values.dcimAuthnApi.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dcim-authn-api
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "dcim-authn-api" "component" "backend") | nindent 4 }}
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: {{ $.Values.dcimAuthnApi.replicas }}
  selector:
    matchLabels:
      {{- include "fundament.selectorLabels" (dict "root" $ "name" "dcim-authn-api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fundament.labels" (dict "root" $ "name" "dcim-authn-api" "component" "backend") | nindent 8 }}
    spec:
      containers:
        - name: dcim-authn-api
          image: {{ $.Values.images.dcimAuthnApi }}
          ports:
            - name: http
              containerPort: 8080
          env:
            {{- include "fundament.jwtSecretEnv" . | nindent 12 }}
            - name: OIDC_ISSUER
              value: {{ .Values.dexDcim.issuer }}
            - name: OIDC_DISCOVERY_URL
              value: {{ .Values.dexDcim.discoveryUrl }}
            - name: OIDC_CLIENT_ID
              value: dcim
            - name: OIDC_REDIRECT_URL
              value: {{ .Values.externalUrls.dcimAuthn }}/callback
            - name: FRONTEND_URL
              value: {{ .Values.externalUrls.dcim }}
            - name: COOKIE_DOMAIN
              value: {{ .Values.externalUrls.cookieDomain }}
            - name: COOKIE_SECURE
              value: "{{ hasPrefix "https://" .Values.externalUrls.dcimAuthn }}"
            - name: LOG_LEVEL
              value: {{ .Values.dcimAuthnApi.logLevel }}
            - name: CORS_ALLOWED_ORIGINS
              value: {{ .Values.externalUrls.corsAllowedOrigins | default .Values.externalUrls.dcim }}
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dcim-authn-api
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "dcim-authn-api" "component" "backend") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      name: http
  selector:
    {{- include "fundament.selectorLabels" (dict "root" $ "name" "dcim-authn-api") | nindent 4 }}

{{- if $.Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dcim-authn-api
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "dcim-authn-api" "component" "backend") | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/enable-cors: "false"
    {{- if $.Values.ingress.tls.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ $.Values.ingress.tls.clusterIssuer }}
    {{- end }}
spec:
  ingressClassName: {{ $.Values.ingress.className }}
  {{- if $.Values.ingress.tls.clusterIssuer }}
  tls:
    - hosts:
        - dcim-authn.{{ include "fundament.ingress.infix" . }}{{ $.Values.ingress.domain }}
      secretName: dcim-authn-api-tls
  {{- end }}
  rules:
    - host: dcim-authn.{{ include "fundament.ingress.infix" . }}{{ $.Values.ingress.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dcim-authn-api
                port:
                  name: http
{{- end }}

{{- end }}

{{- if $.Values.openfga.enabled }}

{{- if not $.Values.db.enabled }}
{{- fail "OpenFGA requires the database to be enabled. Set db.enabled=true or disable OpenFGA with openfga.enabled=false" }}
{{- end }}

{{- /* Generate or reuse a stable password for the OpenFGA database user */ -}}
{{- $openfgaSecretName := "db-fun-openfga" }}
{{- $openfgaExisting := lookup "v1" "Secret" $.Release.Namespace $openfgaSecretName }}
{{- $openfgaPassword := "" }}
{{- if $openfgaExisting }}
{{- $openfgaPassword = index $openfgaExisting.data "password" | b64dec }}
{{- else }}
{{- $openfgaPassword = randAlphaNum 32 }}
{{- end }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $openfgaSecretName }}
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "openfga" "component" "backend") | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: fun_openfga
  password: {{ $openfgaPassword | quote }}
  uri: postgresql://fun_openfga:{{ $openfgaPassword }}@{{ include "fundament.db.host" . }}:5432/openfga

---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: openfga-db
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "openfga" "component" "backend") | nindent 4 }}
spec:
  name: openfga
  owner: fun_openfga
  cluster:
    name: {{ include "fundament.db.name" . }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openfga-model
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "openfga" "component" "backend") | nindent 4 }}
data:
  model.fga: |
{{- .Files.Get "openfga/model.fga" | nindent 4 }}

---
{{- $openfgaConfigName := "openfga-config" }}
{{- $openfgaConfigExisting := lookup "v1" "ConfigMap" $.Release.Namespace $openfgaConfigName }}
{{- $openfgaStoreID := "pending" }}
{{- $openfgaAuthModelID := "pending" }}
{{- if $openfgaConfigExisting }}
{{- $openfgaStoreID = index $openfgaConfigExisting.data "store-id" | default "pending" }}
{{- $openfgaAuthModelID = index $openfgaConfigExisting.data "authorization-model-id" | default "pending" }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $openfgaConfigName }}
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "openfga" "component" "backend") | nindent 4 }}
data:
  store-id: {{ $openfgaStoreID | quote }}
  authorization-model-id: {{ $openfgaAuthModelID | quote }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openfga-setup
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "openfga-setup" "component" "backend") | nindent 4 }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openfga-setup
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "openfga-setup" "component" "backend") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openfga-setup
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "openfga-setup" "component" "backend") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openfga-setup
subjects:
  - kind: ServiceAccount
    name: openfga-setup
    namespace: {{ $.Release.Namespace }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openfga
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "openfga" "component" "backend") | nindent 4 }}
spec:
  replicas: {{ $.Values.openfga.replicas }}
  selector:
    matchLabels:
      {{- include "fundament.selectorLabels" (dict "root" $ "name" "openfga") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fundament.labels" (dict "root" $ "name" "openfga" "component" "backend") | nindent 8 }}
    spec:
      serviceAccountName: openfga-setup
      initContainers:
        - name: wait-for-db
          image: ghcr.io/cloudnative-pg/postgresql:18
          command:
            - sh
            - -c
            - |
              echo "Waiting for OpenFGA database and role to be ready..."
              until psql "$OPENFGA_DATASTORE_URI" -c "SELECT 1" > /dev/null 2>&1; do
                echo "Database not ready, waiting..."
                sleep 3
              done
              echo "Database is ready!"
              {{- if $.Values.db.reset }}
              echo "Resetting OpenFGA database..."
              psql "$OPENFGA_DATASTORE_URI" -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"
              echo "OpenFGA database reset complete."
              {{- end }}
          env:
            - name: PGCONNECT_TIMEOUT
              value: "5"
            - name: OPENFGA_DATASTORE_URI
              valueFrom:
                secretKeyRef:
                  name: {{ $openfgaSecretName }}
                  key: uri
        - name: migrate
          image: {{ $.Values.openfga.image }}
          args:
            - migrate
          env:
            - name: OPENFGA_DATASTORE_ENGINE
              value: postgres
            - name: OPENFGA_DATASTORE_URI
              valueFrom:
                secretKeyRef:
                  name: {{ $openfgaSecretName }}
                  key: uri
      containers:
        - name: openfga
          image: {{ $.Values.openfga.image }}
          args:
            - run
          ports:
            - name: http
              containerPort: {{ $.Values.openfga.apiPort | default 8080 }}
            - name: grpc
              containerPort: 8081
            {{- if $.Values.openfga.playground.enabled }}
            - name: playground
              containerPort: 3000
            {{- end }}
          env:
            - name: OPENFGA_DATASTORE_ENGINE
              value: postgres
            - name: OPENFGA_DATASTORE_URI
              valueFrom:
                secretKeyRef:
                  name: {{ $openfgaSecretName }}
                  key: uri
            - name: OPENFGA_PLAYGROUND_ENABLED
              value: {{ $.Values.openfga.playground.enabled | quote }}
            - name: OPENFGA_HTTP_ADDR
              value: "0.0.0.0:{{ $.Values.openfga.apiPort | default 8080 }}"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
        - name: setup
          image: {{ $.Values.images.openfgaSetup }}
          command:
            - bash
            - -c
            - |
              set -euo pipefail

              export FGA_API_URL="http://localhost:{{ $.Values.openfga.apiPort | default 8080 }}"

              echo "Waiting for OpenFGA to be ready..."
              until curl -sf "$FGA_API_URL/healthz" > /dev/null 2>&1; do
                sleep 2
              done
              echo "OpenFGA is ready!"

              echo "Checking if OpenFGA store already exists..."

              # Check if store already exists
              EXISTING_STORE_ID=$(curl -sf "$FGA_API_URL/stores" | jq -r '.stores[] | select(.name == "fundament") | .id' | head -1)

              if [ -n "$EXISTING_STORE_ID" ]; then
                echo "Store 'fundament' already exists with ID: $EXISTING_STORE_ID"
                export FGA_STORE_ID="$EXISTING_STORE_ID"

                # Get current model ID from configmap (if exists)
                CURRENT_MODEL_ID=$(kubectl get configmap openfga-config -o jsonpath='{.data.authorization-model-id}' 2>/dev/null || echo "")

                # Write the model and get the new model ID
                echo "Writing authorization model..."
                fga model write --store-id "$FGA_STORE_ID" --file /model/model.fga

                NEW_MODEL_ID=$(fga model get --store-id "$FGA_STORE_ID" --field id | sed 's/^# Model ID: //')
                echo "Authorization model ID: $NEW_MODEL_ID"

                if [ "$CURRENT_MODEL_ID" = "$NEW_MODEL_ID" ]; then
                  echo "Model unchanged, no configmap update needed"
                  echo "Setup complete, sleeping..."
                  exec sleep infinity
                fi

                echo "Model changed from '$CURRENT_MODEL_ID' to '$NEW_MODEL_ID', updating configmap..."
                MODEL_ID="$NEW_MODEL_ID"
              else
                echo "Creating new store 'fundament' with model..."
                RESULT=$(fga store create --name fundament --model /model/model.fga)
                export FGA_STORE_ID=$(echo "$RESULT" | jq -r '.store.id')
                echo "Store created with ID: $FGA_STORE_ID"

                MODEL_ID=$(fga model get --store-id "$FGA_STORE_ID" --field id | sed 's/^# Model ID: //')
                echo "Authorization model ID: $MODEL_ID"
              fi

              # Write store ID and model ID to the ConfigMap managed by Helm
              kubectl patch configmap openfga-config \
                -n {{ $.Release.Namespace }} \
                --patch "{\"data\":{\"store-id\":\"$FGA_STORE_ID\",\"authorization-model-id\":\"$MODEL_ID\"}}"

              echo "ConfigMap updated successfully"
              echo "Setup complete, sleeping..."
              exec sleep infinity
          volumeMounts:
            - name: model
              mountPath: /model
      volumes:
        - name: model
          configMap:
            name: openfga-model

---
apiVersion: v1
kind: Service
metadata:
  name: openfga
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "openfga" "component" "backend") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ $.Values.openfga.apiPort | default 8080 }}
      targetPort: http
      name: http
    - port: 8081
      targetPort: grpc
      name: grpc
    {{- if $.Values.openfga.playground.enabled }}
    - port: 3000
      targetPort: playground
      name: playground
    {{- end }}
  selector:
    {{- include "fundament.selectorLabels" (dict "root" $ "name" "openfga") | nindent 4 }}

{{- end }}

{{- if $.Values.kubeApiProxy.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-api-proxy
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "kube-api-proxy" "component" "backend") | nindent 4 }}
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: {{ $.Values.kubeApiProxy.replicas }}
  selector:
    matchLabels:
      {{- include "fundament.selectorLabels" (dict "root" $ "name" "kube-api-proxy") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fundament.labels" (dict "root" $ "name" "kube-api-proxy" "component" "backend") | nindent 8 }}
    spec:
      containers:
        - name: kube-api-proxy
          image: {{ $.Values.images.kubeApiProxy }}
          ports:
            - name: http
              containerPort: 8081
          env:
            {{- include "fundament.jwtSecretEnv" . | nindent 12 }}
            - name: LOG_LEVEL
              value: "{{ .Values.kubeApiProxy.logLevel }}"
            {{- if $.Values.externalUrls.corsAllowedOrigins }}
            - name: CORS_ALLOWED_ORIGINS
              value: "{{ $.Values.externalUrls.corsAllowedOrigins }}"
            {{- end }}
            - name: KUBE_API_PROXY_MODE
              value: "{{ .Values.kubeApiProxy.mode }}"
            {{- if $.Values.kubeApiProxy.gardenerKubeconfigSecret }}
            - name: GARDENER_KUBECONFIG
              value: /etc/gardener/kubeconfig
            {{- end }}
            {{- if $.Values.openfga.enabled }}
            - name: OPENFGA_API_URL
              value: http://openfga:{{ $.Values.openfga.apiPort | default 8080 }}
            - name: OPENFGA_STORE_ID
              valueFrom:
                configMapKeyRef:
                  name: openfga-config
                  key: store-id
            - name: OPENFGA_AUTHORIZATION_MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: openfga-config
                  key: authorization-model-id
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /src/tmp
            {{- if $.Values.kubeApiProxy.gardenerKubeconfigSecret }}
            - name: gardener-kubeconfig
              mountPath: /etc/gardener
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
        - name: go-tmp
          emptyDir: {}
        {{- if $.Values.kubeApiProxy.gardenerKubeconfigSecret }}
        - name: gardener-kubeconfig
          secret:
            secretName: {{ $.Values.kubeApiProxy.gardenerKubeconfigSecret }}
        {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: kube-api-proxy
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "kube-api-proxy" "component" "backend") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: http
      name: http
  selector:
    {{- include "fundament.selectorLabels" (dict "root" $ "name" "kube-api-proxy") | nindent 4 }}

{{- if $.Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kube-api-proxy
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "kube-api-proxy" "component" "backend") | nindent 4 }}
  annotations:
    {{- if $.Values.ingress.tls.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ $.Values.ingress.tls.clusterIssuer }}
    {{- end }}
spec:
  ingressClassName: {{ $.Values.ingress.className }}
  {{- if $.Values.ingress.tls.clusterIssuer }}
  tls:
    - hosts:
        - k8s-api.{{ include "fundament.ingress.infix" . }}{{ $.Values.ingress.domain }}
      secretName: kube-api-proxy-tls
  {{- end }}
  rules:
    - host: k8s-api.{{ include "fundament.ingress.infix" . }}{{ $.Values.ingress.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kube-api-proxy
                port:
                  name: http
{{- end }}

{{- end }}

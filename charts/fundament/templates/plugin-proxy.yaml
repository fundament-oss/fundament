{{- if $.Values.pluginProxy.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plugin-proxy
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "plugin-proxy" "component" "backend") | nindent 4 }}
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: {{ $.Values.pluginProxy.replicas }}
  selector:
    matchLabels:
      {{- include "fundament.selectorLabels" (dict "root" $ "name" "plugin-proxy") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fundament.labels" (dict "root" $ "name" "plugin-proxy" "component" "backend") | nindent 8 }}
    spec:
      containers:
        - name: plugin-proxy
          image: {{ $.Values.images.pluginProxy }}
          ports:
            - name: http
              containerPort: 8080
            - name: internal
              containerPort: 8081
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: INTERNAL_LISTEN_ADDR
              value: ":8081"
            - name: PLUGIN_PROXY_MODE
              value: {{ $.Values.pluginProxy.mode | quote }}
            - name: LOG_LEVEL
              value: {{ $.Values.pluginProxy.logLevel }}
            {{- include "fundament.jwtSecretEnv" . | nindent 12 }}
            {{- if $.Values.externalUrls.pluginProxy }}
            - name: PLUGIN_PROXY_ORIGIN
              value: {{ $.Values.externalUrls.pluginProxy }}
            {{- end }}
            {{- if $.Values.externalUrls.kubeApiProxy }}
            - name: KUBE_API_PROXY_ORIGIN
              value: {{ $.Values.externalUrls.kubeApiProxy }}
            {{- end }}
            {{- if $.Values.externalUrls.console }}
            - name: CONSOLE_ORIGIN
              value: {{ $.Values.externalUrls.console }}
            {{- end }}
          {{- include "fundament.livenessProbe" (dict "root" $ "port" "internal") | nindent 10 }}
          {{- include "fundament.readinessProbe" (dict "root" $ "port" "internal") | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: plugin-proxy
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "plugin-proxy" "component" "backend") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      name: http
    - port: 8081
      targetPort: internal
      name: internal
  selector:
    {{- include "fundament.selectorLabels" (dict "root" $ "name" "plugin-proxy") | nindent 4 }}

{{- if $.Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plugin-proxy
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "plugin-proxy" "component" "backend") | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/enable-cors: "false"
    {{- if $.Values.ingress.tls.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ $.Values.ingress.tls.clusterIssuer }}
    {{- end }}
spec:
  ingressClassName: {{ $.Values.ingress.className }}
  {{- if $.Values.ingress.tls.clusterIssuer }}
  tls:
    - hosts:
        - plugin-proxy.{{ include "fundament.ingress.infix" . }}{{ $.Values.ingress.domain }}
      secretName: plugin-proxy-tls
  {{- end }}
  rules:
    - host: plugin-proxy.{{ include "fundament.ingress.infix" . }}{{ $.Values.ingress.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: plugin-proxy
                port:
                  name: http
{{- end }}
{{- end }}

{{- if $.Values.dcimApi.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dcim-api
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "dcim-api" "component" "backend") | nindent 4 }}
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: {{ $.Values.dcimApi.replicas }}
  selector:
    matchLabels:
      {{- include "fundament.selectorLabels" (dict "root" $ "name" "dcim-api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fundament.labels" (dict "root" $ "name" "dcim-api" "component" "backend") | nindent 8 }}
    spec:
      containers:
        - name: dcim-api
          image: {{ $.Values.images.dcimApi }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-fun-dcim-api
                  key: uri
            - name: LOG_LEVEL
              value: {{ .Values.dcimApi.logLevel }}
            {{- if $.Values.externalUrls.corsAllowedOrigins }}
            - name: CORS_ALLOWED_ORIGINS
              value: {{ $.Values.externalUrls.corsAllowedOrigins }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: dcim-api
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "dcim-api" "component" "backend") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      name: http
  selector:
    {{- include "fundament.selectorLabels" (dict "root" $ "name" "dcim-api") | nindent 4 }}

{{- if $.Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dcim-api
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "dcim-api" "component" "backend") | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    {{- if $.Values.ingress.tls.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ $.Values.ingress.tls.clusterIssuer }}
    {{- end }}
spec:
  ingressClassName: {{ $.Values.ingress.className }}
  {{- if $.Values.ingress.tls.clusterIssuer }}
  tls:
    - hosts:
        - dcim-api.{{ include "fundament.ingress.infix" . }}{{ $.Values.ingress.domain }}
      secretName: dcim-api-tls
  {{- end }}
  rules:
    - host: dcim-api.{{ include "fundament.ingress.infix" . }}{{ $.Values.ingress.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dcim-api
                port:
                  name: http
{{- end }}

{{- end }}

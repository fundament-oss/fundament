{{- if $.Values.organizationApi.httproute.enabled }}
{{- if not $.Values.organizationApi.httproute.parentRefs }}{{ fail "organizationApi.httproute.parentRefs is required when httproute is enabled" }}{{ end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $.Release.Name }}-organization-api
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "organization-api" "component" "gateway") | nindent 4 }}
  {{- with $.Values.organizationApi.httproute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml $.Values.organizationApi.httproute.parentRefs | nindent 4 }}
  hostnames:
    {{- toYaml $.Values.organizationApi.httproute.hostnames | nindent 4 }}
  rules:
    - backendRefs:
        - name: organization-api
          port: 8080
{{- end }}

{{- if $.Values.pluginProxy.httproute.enabled }}
{{- if not $.Values.pluginProxy.httproute.parentRefs }}{{ fail "pluginProxy.httproute.parentRefs is required when httproute is enabled" }}{{ end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $.Release.Name }}-plugin-proxy
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "plugin-proxy" "component" "gateway") | nindent 4 }}
spec:
  parentRefs:
    {{- toYaml $.Values.pluginProxy.httproute.parentRefs | nindent 4 }}
  hostnames:
    {{- toYaml $.Values.pluginProxy.httproute.hostnames | nindent 4 }}
  rules:
    - backendRefs:
        - name: plugin-proxy
          port: 8080
{{- end }}

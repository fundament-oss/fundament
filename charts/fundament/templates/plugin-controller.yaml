{{- if $.Values.pluginController.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $.Release.Name }}-plugin-controller
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "plugin-controller" "component" "plugin-controller") | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $.Release.Name }}-plugin-controller
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "plugin-controller" "component" "plugin-controller") | nindent 4 }}
rules:
  - apiGroups:
      - plugins.fundament.io
    resources:
      - plugininstallations
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups:
      - plugins.fundament.io
    resources:
      - plugininstallations/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - namespaces
      - serviceaccounts
      - services
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - rolebindings
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
      - bind
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - clusterroles
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
      - bind
      # Plugin-scope ClusterRoles carry rules materialised from the pinned
      # PluginDefinition (FUN-17). Escalate is required to write rules the
      # controller SA doesn't itself hold.
      #
      # Escalation is bounded by the definition-hash gate:
      # `spec.definitionRef.definitionHash` MUST match the plugin's actual
      # GetDefinition (see hashDefinition in reconciler.go). The only way to
      # skip that check is the operator-set `PLUGIN_CONTROLLER_ALLOW_UNPINNED_HASH`
      # env var on the controller Deployment — no CR field can bypass it.
      # Combine this with a Kyverno/OPA policy that restricts the RBAC rules
      # allowed inside plugin-scope ClusterRoles for defence-in-depth.
      - escalate
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - clusterrolebindings
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $.Release.Name }}-plugin-controller
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "plugin-controller" "component" "plugin-controller") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $.Release.Name }}-plugin-controller
subjects:
  - kind: ServiceAccount
    name: {{ $.Release.Name }}-plugin-controller
    namespace: {{ $.Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-plugin-controller
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "plugin-controller" "component" "plugin-controller") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: plugin-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/component: plugin-controller
    spec:
      serviceAccountName: {{ $.Release.Name }}-plugin-controller
      containers:
        - name: plugin-controller
          image: {{ $.Values.images.pluginController }}
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: FUNDAMENT_CLUSTER_ID
              value: {{ $.Release.Name }}
            - name: FUNDAMENT_INSTALL_ID
              value: {{ $.Release.Name }}
            - name: FUNDAMENT_ORGANIZATION_ID
              value: {{ $.Release.Name }}
            - name: ORGANIZATION_API_URL
              value: {{ $.Values.pluginController.organizationApiUrl }}
            - name: LOG_LEVEL
              value: {{ $.Values.pluginController.logLevel }}
            {{- if $.Values.pluginController.allowUnpinnedHash }}
            # Local dev only: lets PluginInstallations with an empty
            # definitionHash materialise their scope from the plugin's live
            # GetDefinition without hash verification. Never set in production.
            - name: PLUGIN_CONTROLLER_ALLOW_UNPINNED_HASH
              value: "true"
            {{- end }}
          livenessProbe:
            httpGet:
              path: /livez
              port: 8097
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8097
            initialDelaySeconds: 5
            periodSeconds: 10
{{- end }}

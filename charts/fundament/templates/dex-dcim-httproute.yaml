{{- if $.Values.dexDcim.httproute.enabled }}
{{- if not $.Values.dexDcim.httproute.parentRefs }}{{ fail "dexDcim.httproute.parentRefs is required when httproute is enabled" }}{{ end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $.Release.Name }}-dex-dcim
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "dex-dcim" "component" "gateway") | nindent 4 }}
spec:
  parentRefs:
    {{- toYaml $.Values.dexDcim.httproute.parentRefs | nindent 4 }}
  hostnames:
    {{- toYaml $.Values.dexDcim.httproute.hostnames | nindent 4 }}
  rules:
    - backendRefs:
        - name: dex-dcim
          port: 5556
{{- end }}

{{- if $.Values.clusterWorker.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-worker
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "cluster-worker" "component" "worker") | nindent 4 }}
spec:
  replicas: {{ $.Values.clusterWorker.replicas }}
  selector:
    matchLabels:
      {{- include "fundament.selectorLabels" (dict "root" $ "name" "cluster-worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fundament.labels" (dict "root" $ "name" "cluster-worker" "component" "worker") | nindent 8 }}
    spec:
      containers:
        - name: cluster-worker
          image: {{ $.Values.images.clusterWorker }}
          ports:
            - name: health
              containerPort: 8097
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-fun-cluster-worker
                  key: uri
            - name: GARDENER_MODE
              value: {{ $.Values.clusterWorker.gardenerMode }}
            - name: LOG_LEVEL
              value: {{ $.Values.clusterWorker.logLevel }}
            {{- if $.Values.clusterWorker.gardenerKubeconfigSecret }}
            - name: GARDENER_KUBECONFIG
              value: /etc/gardener/kubeconfig
            - name: GARDENER_PROVIDER_TYPE
              value: {{ $.Values.clusterWorker.gardenerProviderType | default "local" }}
            - name: GARDENER_CLOUD_PROFILE
              value: {{ $.Values.clusterWorker.gardenerCloudProfile | default "local" }}
            - name: GARDENER_CREDENTIALS_BINDING_NAME
              value: {{ $.Values.clusterWorker.gardenerCredentialsBindingName | default "" }}
            {{- with $.Values.clusterWorker.gardenerCredentialsSecretRef }}
            - name: GARDENER_CREDENTIALS_SECRET_REF
              value: {{ . }}
            {{- end }}
            {{- with $.Values.clusterWorker.gardenerMachineImageName }}
            - name: GARDENER_MACHINE_IMAGE_NAME
              value: {{ . }}
            {{- end }}
            {{- with $.Values.clusterWorker.gardenerMachineImageVersion }}
            - name: GARDENER_MACHINE_IMAGE_VERSION
              value: {{ . }}
            {{- end }}
            {{- with $.Values.clusterWorker.gardenerDefaultMachineType }}
            - name: GARDENER_DEFAULT_MACHINE_TYPE
              value: {{ . }}
            {{- end }}
            {{- with $.Values.clusterWorker.gardenerNetworkingType }}
            - name: GARDENER_NETWORKING_TYPE
              value: {{ . }}
            {{- end }}
            {{- with $.Values.clusterWorker.gardenerNetworkingNodes }}
            - name: GARDENER_NETWORKING_NODES
              value: {{ . }}
            {{- end }}
            {{- with $.Values.clusterWorker.gardenerShootAnnotations }}
            - name: GARDENER_SHOOT_ANNOTATIONS
              value: {{ . }}
            {{- end }}
            {{- if $.Values.clusterWorker.gardenerInfrastructureConfig }}
            - name: GARDENER_INFRASTRUCTURE_CONFIG_FILE
              value: /etc/gardener-provider/infrastructure-config.json
            {{- end }}
            {{- if $.Values.clusterWorker.gardenerControlPlaneConfig }}
            - name: GARDENER_CONTROLPLANE_CONFIG_FILE
              value: /etc/gardener-provider/controlplane-config.json
            {{- end }}
            {{- end }}
          {{- if $.Values.clusterWorker.gardenerKubeconfigSecret }}
          volumeMounts:
            - name: gardener-kubeconfig
              mountPath: /etc/gardener
              readOnly: true
            {{- if or $.Values.clusterWorker.gardenerInfrastructureConfig $.Values.clusterWorker.gardenerControlPlaneConfig }}
            - name: gardener-provider-config
              mountPath: /etc/gardener-provider
              readOnly: true
            {{- end }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /livez
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
      {{- if $.Values.clusterWorker.gardenerKubeconfigSecret }}
      volumes:
        - name: gardener-kubeconfig
          secret:
            secretName: {{ $.Values.clusterWorker.gardenerKubeconfigSecret }}
        {{- if or $.Values.clusterWorker.gardenerInfrastructureConfig $.Values.clusterWorker.gardenerControlPlaneConfig }}
        - name: gardener-provider-config
          configMap:
            name: cluster-worker-provider-config
        {{- end }}
      {{- end }}
{{- if or $.Values.clusterWorker.gardenerInfrastructureConfig $.Values.clusterWorker.gardenerControlPlaneConfig }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-worker-provider-config
  labels:
    {{- include "fundament.labels" (dict "root" $ "name" "cluster-worker" "component" "worker") | nindent 4 }}
data:
  {{- if $.Values.clusterWorker.gardenerInfrastructureConfig }}
  infrastructure-config.json: |
    {{- $.Values.clusterWorker.gardenerInfrastructureConfig | nindent 4 }}
  {{- end }}
  {{- if $.Values.clusterWorker.gardenerControlPlaneConfig }}
  controlplane-config.json: |
    {{- $.Values.clusterWorker.gardenerControlPlaneConfig | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: plugininstallations.plugins.fundament.io
spec:
  group: plugins.fundament.io
  names:
    kind: PluginInstallation
    listKind: PluginInstallationList
    plural: plugininstallations
    singular: plugininstallation
    shortNames:
      - pi
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Plugin
          type: string
          jsonPath: .spec.pluginName
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - image
                - pluginName
                - version
              properties:
                image:
                  type: string
                pluginName:
                  type: string
                version:
                  type: string
                clusterRoles:
                  type: array
                  items:
                    type: string
                config:
                  type: object
                  additionalProperties:
                    type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                message:
                  type: string
                ready:
                  type: boolean
                observedGeneration:
                  type: integer
                  format: int64
                pluginVersion:
                  type: string

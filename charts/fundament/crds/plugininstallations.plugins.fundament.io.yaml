apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: plugininstallations.plugins.fundament.io
spec:
  group: plugins.fundament.io
  names:
    kind: PluginInstallation
    listKind: PluginInstallationList
    plural: plugininstallations
    singular: plugininstallation
    shortNames:
      - pi
  scope: Cluster
  versions:
    - name: v1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Plugin
          type: string
          jsonPath: .spec.pluginName
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          x-kubernetes-validations:
            - rule: "self.metadata.name == self.spec.pluginName"
              message: "metadata.name must match spec.pluginName"
          properties:
            spec:
              type: object
              required:
                - image
                - pluginName
              properties:
                image:
                  type: string
                imagePullPolicy:
                  type: string
                  enum:
                    - Always
                    - IfNotPresent
                    - Never
                pluginName:
                  type: string
                  x-kubernetes-validations:
                    - rule: "self == oldSelf"
                      message: "spec.pluginName is immutable"
                clusterRoles:
                  type: array
                  items:
                    type: string
                config:
                  type: object
                  additionalProperties:
                    type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Deploying
                    - Running
                    - Degraded
                    - Failed
                    - Terminating
                message:
                  type: string
                ready:
                  type: boolean
                observedGeneration:
                  type: integer
                  format: int64

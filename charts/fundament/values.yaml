# Fundament Helm Chart - Default Values

# JWT Secret - required for token signing/validation across services
jwtSecret: ""
jwtSecretRef:
  name: "" # Name of the Kubernetes Secret
  key: "" # Key within the Secret containing the JWT secret

# External URLs - must be set for your environment
externalUrls:
  authn: "" # e.g., https://authn.example.com
  organization: "" # e.g., https://organization.example.com
  kubeApiProxy: "" # e.g., https://k8s-api.example.com
  corsAllowedOrigins: "" # e.g., "https://console.example.com" (comma-separated; defaults to console URL if empty)
  console: "" # e.g., https://app.example.com
  docs: "" # e.g., https://docs.example.com
  dcimApi: "" # e.g., https://dcim-api.example.com
  dcim: "" # e.g., https://dcim.example.com
  cookieDomain: "" # e.g., example.com

# Container images
images:
  dbMigrations: ghcr.io/fundament-oss/fundament/db-migrations:latest
  authnApi: ghcr.io/fundament-oss/fundament/authn-api:latest
  organizationApi: ghcr.io/fundament-oss/fundament/organization-api:latest
  consoleFrontend: ghcr.io/fundament-oss/fundament/console-frontend:latest
  docsFrontend: ghcr.io/fundament-oss/fundament/docs-frontend:latest
  clusterWorker: ghcr.io/fundament-oss/fundament/cluster-worker:latest
  authzWorker: ghcr.io/fundament-oss/fundament/authz-worker:latest
  kubeApiProxy: ghcr.io/fundament-oss/fundament/kube-api-proxy:latest
  openfgaSetup: ghcr.io/fundament-oss/fundament/openfga-setup:latest
  pluginController: ghcr.io/fundament-oss/fundament/plugin-controller:latest
  dcimApi: ghcr.io/fundament-oss/fundament/dcim-api:latest
  dcimFrontend: ghcr.io/fundament-oss/fundament/dcim-frontend:latest

# Database (CloudNativePG)
db:
  enabled: true
  instances: 1
  storageSize: 1Gi
  reset: false
  insertTestData: false
  exposePort: 0 # Expose postgres on this port via LoadBalancer (0 = disabled)

# Authentication API
authnApi:
  enabled: true
  replicas: 1
  logLevel: info
  httproute:
    enabled: false
    parentRefs: []
    #  - name: gateway
    #    namespace: gateway-ns
    hostnames: []
    #  - authn.example.com

# Organization API
organizationApi:
  enabled: false
  replicas: 1
  logLevel: info
  prometheusURL: mock # Prometheus URL for metrics; "mock" uses generated data
  httproute:
    enabled: false
    parentRefs: []
    #  - name: gateway
    #    namespace: gateway-ns
    hostnames: []
    #  - organization.example.com

# Kube Proxy (Kubernetes API proxy for frontend)
kubeApiProxy:
  enabled: false
  replicas: 1
  logLevel: info
  mode: mock # "mock" or "real"
  gardenerKubeconfigSecret: "" # Secret name containing a Gardener kubeconfig (only used when mode is "real")

# Cluster Worker
clusterWorker:
  enabled: false
  replicas: 1
  logLevel: info
  gardenerMode: mock # mock or real
  gardenerKubeconfigSecret: "" # Secret name containing kubeconfig for real mode

# Console Frontend
consoleFrontend:
  enabled: false
  replicas: 1
  httproute:
    enabled: false
    parentRefs: []
    #  - name: gateway
    #    namespace: gateway-ns
    hostnames: []
    #  - console.example.com

# Docs frontend
docsFrontend:
  enabled: false
  replicas: 1
  httproute:
    enabled: false
    parentRefs: []
    #  - name: gateway
    #    namespace: gateway-ns
    hostnames: []
    #  - docs.example.com

# Authz Worker (outbox pattern for OpenFGA tuple sync)
authzWorker:
  enabled: false
  replicas: 1
  logLevel: info
  pollInterval: "5s"
  batchSize: 100
  maxRetries: 3

# OpenFGA (Fine-Grained Authorization)
openfga:
  enabled: true
  image: openfga/openfga:v1.11.3
  replicas: 1
  playground:
    enabled: false

# Plugin Controller
pluginController:
  enabled: false
  logLevel: info

# DCIM API
dcimApi:
  enabled: false
  replicas: 1
  logLevel: info
  httproute:
    enabled: false
    parentRefs: []
    hostnames: []

# DCIM Frontend
dcimFrontend:
  enabled: false
  replicas: 1
  httproute:
    enabled: false
    parentRefs: []
    hostnames: []

# Dex (OIDC Identity Provider)
dex:
  enabled: true
  issuer: ""
  discoveryUrl: "" # Internal URL for OIDC discovery (defaults to issuer if empty)
  staticClients: []
  staticPasswords: []
  httproute:
    enabled: false
    parentRefs: []
    #  - name: gateway
    #    namespace: gateway-ns
    hostnames: []
    #  - dex.example.com

# Host aliases for pods (useful for local development to resolve external URLs to internal services)
hostAliases: []

# Ingress
ingress:
  enabled: false
  className: nginx
  domain: ""
  subdomainInfix: "" # e.g., "pr123." for PR environments → console.pr123.domain
  tls:
    clusterIssuer: ""

# Gardener shoot proxy (local development only)
shootProxy:
  enabled: false

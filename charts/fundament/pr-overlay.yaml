apiVersion: v1
kind: Namespace
metadata:
  name: tn-fundament-pr-${PR_NUM}
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    cert-manager.io/private-key-algorithm: ECDSA
    cert-manager.io/private-key-size: "256"
    cert-manager.io/private-key-rotation-policy: Always
  name: tn-fundament-pr-${PR_NUM}
  namespace: istio-gateway
spec:
  parentRef:
    name: public-gateway
    namespace: istio-gateway
  listeners:
    - name: tn-fundament-pr-${PR_NUM}
      hostname: "*.pr${PR_NUM}.${DOMAIN}"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: tn-fundament-pr-${PR_NUM}-wildcard-tls
            kind: Secret
      allowedRoutes:
        kinds:
          - kind: HTTPRoute
        namespaces:
          from: All
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: fundament
  namespace: tn-fundament-pr-${PR_NUM}
spec:
  interval: 1m
  url: https://github.com/fundament-oss/fundament
  ref:
    branch: ${PR_BRANCH}
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fundament
  namespace: tn-fundament-pr-${PR_NUM}
spec:
  releaseName: fundament
  timeout: 15m
  install:
    createNamespace: true
  interval: 5m
  chart:
    spec:
      chart: charts/fundament
      sourceRef:
        kind: GitRepository
        name: fundament
      reconcileStrategy: Revision
      interval: 1m
      valuesFiles:
        - charts/fundament/values.yaml
        - charts/fundament/values-sandbox.yaml
  values:
    # Override sandbox's jwtSecretRef with direct value
    jwtSecretRef:
      name: ""
      key: ""
    jwtSecret: ${JWT_SECRET}

    externalUrls:
      authn: https://authn.pr${PR_NUM}.${DOMAIN}
      organization: https://organization.pr${PR_NUM}.${DOMAIN}
      kubeApiProxy: https://k8s-api.pr${PR_NUM}.${DOMAIN}
      console: https://console.pr${PR_NUM}.${DOMAIN}
      docs: https://docs.pr${PR_NUM}.${DOMAIN}
      cookieDomain: pr${PR_NUM}.${DOMAIN}
      dcimApi: https://dcim-api.pr${PR_NUM}.${DOMAIN}
      dcim: https://dcim.pr${PR_NUM}.${DOMAIN}
      dcimAuthn: https://dcim-authn.pr${PR_NUM}.${DOMAIN}
      corsAllowedOrigins: "https://console.pr${PR_NUM}.${DOMAIN},https://dcim.pr${PR_NUM}.${DOMAIN}"

    images:
      dbMigrations: ${IMAGE_PREFIX}/db-migrations:${IMAGE_TAG}
      authnApi: ${IMAGE_PREFIX}/authn-api:${IMAGE_TAG}
      organizationApi: ${IMAGE_PREFIX}/organization-api:${IMAGE_TAG}
      consoleFrontend: ${IMAGE_PREFIX}/console-frontend:${IMAGE_TAG}
      docsFrontend: ${IMAGE_PREFIX}/docs-frontend:${IMAGE_TAG}
      clusterWorker: ${IMAGE_PREFIX}/cluster-worker:${IMAGE_TAG}
      authzWorker: ${IMAGE_PREFIX}/authz-worker:${IMAGE_TAG}
      kubeApiProxy: ${IMAGE_PREFIX}/kube-api-proxy:${IMAGE_TAG}
      pluginProxy: ${IMAGE_PREFIX}/plugin-proxy:${IMAGE_TAG}
      openfgaSetup: ${IMAGE_PREFIX}/openfga-setup:${IMAGE_TAG}
      dcimApi: ${IMAGE_PREFIX}/dcim-api:${IMAGE_TAG}
      dcimFrontend: ${IMAGE_PREFIX}/dcim-frontend:${IMAGE_TAG}
      dcimAuthnApi: ${IMAGE_PREFIX}/dcim-authn-api:${IMAGE_TAG}

    authnApi:
      replicas: 1
      httproute:
        enabled: true
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: ListenerSet
            name: tn-fundament-pr-${PR_NUM}
            namespace: istio-gateway
            sectionName: tn-fundament-pr-${PR_NUM}
        hostnames:
          - authn.pr${PR_NUM}.${DOMAIN}

    organizationApi:
      replicas: 1
      httproute:
        enabled: true
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: ListenerSet
            name: tn-fundament-pr-${PR_NUM}
            namespace: istio-gateway
            sectionName: tn-fundament-pr-${PR_NUM}
        hostnames:
          - organization.pr${PR_NUM}.${DOMAIN}

    consoleFrontend:
      replicas: 1
      httproute:
        enabled: true
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: ListenerSet
            name: tn-fundament-pr-${PR_NUM}
            namespace: istio-gateway
            sectionName: tn-fundament-pr-${PR_NUM}
        hostnames:
          - console.pr${PR_NUM}.${DOMAIN}

    docsFrontend:
      replicas: 1
      httproute:
        enabled: true
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: ListenerSet
            name: tn-fundament-pr-${PR_NUM}
            namespace: istio-gateway
            sectionName: tn-fundament-pr-${PR_NUM}
        hostnames:
          - docs.pr${PR_NUM}.${DOMAIN}

    db:
      instances: 1
      storageSize: 1Gi
      reset: true

    kubeApiProxy:
      enabled: true
      replicas: 1
      logLevel: debug
      mode: mock
      httproute:
        enabled: true
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: ListenerSet
            name: tn-fundament-pr-${PR_NUM}
            namespace: istio-gateway
            sectionName: tn-fundament-pr-${PR_NUM}
        hostnames:
          - k8s-api.pr${PR_NUM}.${DOMAIN}

    clusterWorker:
      enabled: true
      replicas: 1
      logLevel: debug
      gardenerMode: mock

    pluginProxy:
      enabled: true
      replicas: 1
      logLevel: debug
      mode: mock

    authzWorker:
      replicas: 1

    openfga:
      replicas: 1
      playground:
        enabled: false

    dex:
      issuer: https://dex.pr${PR_NUM}.${DOMAIN}
      httproute:
        enabled: true
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: ListenerSet
            name: tn-fundament-pr-${PR_NUM}
            namespace: istio-gateway
            sectionName: tn-fundament-pr-${PR_NUM}
        hostnames:
          - dex.pr${PR_NUM}.${DOMAIN}
      staticClients:
        - id: fundament
          name: Fundament
          redirectURIs:
            - https://authn.pr${PR_NUM}.${DOMAIN}/callback
          public: true

    # DCIM OIDC provider. staticPasswords (with DCIM-specific 019d0000 userIDs)
    # are inherited from values-sandbox.yaml; only PR-URL-specific fields are
    # overridden here.
    dexDcim:
      issuer: https://dex-dcim.pr${PR_NUM}.${DOMAIN}
      httproute:
        enabled: true
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: ListenerSet
            name: tn-fundament-pr-${PR_NUM}
            namespace: istio-gateway
            sectionName: tn-fundament-pr-${PR_NUM}
        hostnames:
          - dex-dcim.pr${PR_NUM}.${DOMAIN}
      staticClients:
        - id: dcim
          name: "DCIM Auth API"
          redirectURIs:
            - https://dcim-authn.pr${PR_NUM}.${DOMAIN}/callback
          public: true

    dcimApi:
      enabled: true
      replicas: 1
      logLevel: debug
      httproute:
        enabled: true
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: ListenerSet
            name: tn-fundament-pr-${PR_NUM}
            namespace: istio-gateway
            sectionName: tn-fundament-pr-${PR_NUM}
        hostnames:
          - dcim-api.pr${PR_NUM}.${DOMAIN}

    dcimFrontend:
      enabled: true
      replicas: 1
      httproute:
        enabled: true
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: ListenerSet
            name: tn-fundament-pr-${PR_NUM}
            namespace: istio-gateway
            sectionName: tn-fundament-pr-${PR_NUM}
        hostnames:
          - dcim.pr${PR_NUM}.${DOMAIN}

    # DCIM auth backend. enabled + passwordLoginEnabled are inherited from
    # values-sandbox.yaml; only the PR route is added here.
    dcimAuthnApi:
      replicas: 1
      httproute:
        enabled: true
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: ListenerSet
            name: tn-fundament-pr-${PR_NUM}
            namespace: istio-gateway
            sectionName: tn-fundament-pr-${PR_NUM}
        hostnames:
          - dcim-authn.pr${PR_NUM}.${DOMAIN}

    ingress:
      enabled: false

kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: inways.openfsc.fundament.io
spec:
  group: openfsc.fundament.io
  names:
    kind: Inway
    listKind: InwayList
    plural: inways
    shortNames:
    - inway
    singular: inway
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.inwayName
      name: Inway
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          Inway is a provider gateway through which services are published to the FSC
          group (cluster-scoped). The operator observes its registration; it does not
          create it.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: InwaySpec declares a provider gateway whose registration
              the operator tracks.
            properties:
              inwayName:
                description: InwayName is the FSC name the inway registers under with
                  the Controller.
                type: string
            required:
            - inwayName
            type: object
          status:
            description: |-
              Status is the common reconciliation status shared by the FSC gateway
              resources (Inway, Outway). Their reconcilers are observe-only: they reflect
              whether the declared gateway has registered with the OpenFSC Controller
              Administration API, since inways and outways self-register from their own
              workloads rather than being created by the operator.
            properties:
              conditions:
                description: Conditions follow the standard Kubernetes condition convention.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "open-fsc-outway.fullname" . }}
  labels:
    {{- include "open-fsc-outway.labels" . | nindent 4 }}
  {{- with .Values.deploymentAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "open-fsc-outway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "open-fsc-outway.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/secret-internal-ca-certificate: {{ include (print $.Template.BasePath "/secret-internal-ca-certificate.yaml") . | sha256sum }}
        checksum/secret-group-ca-certificate: {{ include (print $.Template.BasePath "/secret-group-ca-certificate.yaml") . | sha256sum }}
        checksum/secret-tls: {{ include (print $.Template.BasePath "/secret-tls.yaml") . | sha256sum }}
        checksum/secret-tls-server: {{ include (print $.Template.BasePath "/secret-tls-server.yaml") . | sha256sum }}
    spec:
      imagePullSecrets:
        {{- include "open-fsc-outway.imagePullSecrets" . }}
      serviceAccountName: {{ include "open-fsc-outway.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: open-fsc-outway
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ template "open-fsc-outway.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
          {{- if .Values.https.enabled }}
            - name: https
              containerPort: 8443
              protocol: TCP
          {{- else }}
            - name: http
              containerPort: 8080
              protocol: TCP
          {{- end }}
            - name: monitoring
              containerPort: 8081
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health/ready
              port: monitoring
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: monitoring
            initialDelaySeconds: 10
            periodSeconds: 10
          env:
            - name: GROUP_ID
              value: {{ default .Values.config.groupID .Values.global.groupID }}
            - name: NAME
              value: {{ default (include "open-fsc-outway.fullname" .) .Values.config.name }}
            - name: CONTROLLER_REGISTRATION_API_ADDRESS
              value: {{ required "Controller Registration API address is required" ( default .Values.config.controllerApiAddress .Values.config.controllerRegistrationApiAddress )}}
            - name: MANAGER_INTERNAL_ADDRESS
              value: {{ .Values.config.managerInternalAddress }}
            - name: TLS_ROOT_CERT
              value: /config/internal/ca.crt
            - name: TLS_CERT
              value: /certificate-internal/tls.crt
            - name: TLS_KEY
              value: /certificate-internal/tls.key
            - name: GRANT_LINKS_CACHE_TTL
              value: {{ .Values.config.grantLinksCacheTTL }}
          {{- if .Values.https.enabled }}
            - name: LISTEN_ADDRESS
              value: 0.0.0.0:8443
            - name: LISTEN_HTTPS
              value: "1"
            - name: TLS_SERVER_CERT
              value: /certificate-server/tls.crt
            - name: TLS_SERVER_KEY
              value: /certificate-server/tls.key
          {{- else }}
            - name: LISTEN_ADDRESS
              value: 0.0.0.0:8080
          {{- end }}
            - name: MONITORING_ADDRESS
              value: 0.0.0.0:8081
          {{- if .Values.config.authorizationService.enabled }}
            - name: AUTHORIZATION_SERVICE_ADDRESS
              value: {{ .Values.config.authorizationService.url }}
            - name: AUTHORIZATION_ROOT_CA
              value: /config/authorization-service/ca.crt
            - name: AUTHORIZATION_WITH_BODY
              value: {{ quote .Values.config.authorizationService.withBody }}
            - name: AUTHORIZATION_MAX_BODY_SIZE
              value: {{ quote .Values.config.authorizationService.maxBodySize }}
            - name: AUTHORIZATION_BODY_CHUNK_SIZE
              value: {{ quote .Values.config.authorizationService.bodyChunkSize }}
          {{- end }}
          {{- if .Values.config.authZenService.enabled }}
            - name: AUTHZEN_SERVICE_ADDRESS
              value: {{ .Values.config.authZenService.url }}
            - name: AUTHZEN_ROOT_CA
              value: /config/authzen-service/ca.crt
            - name: AUTHZEN_WITH_BODY
              value: {{ quote .Values.config.authZenService.withBody }}
            - name: AUTHZEN_MAX_BODY_SIZE
              value: {{ quote .Values.config.authZenService.maxBodySize }}
            - name: AUTHZEN_BODY_CHUNK_SIZE
              value: {{ quote .Values.config.authZenService.bodyChunkSize }}
          {{- end }}
            - name: TLS_GROUP_ROOT_CERT
              value: /config/group/ca-group.pem
            - name: TLS_GROUP_CERT
              value: /certificate-group/tls.crt
            - name: TLS_GROUP_KEY
              value: /certificate-group/tls.key
            - name: TX_LOG_API_ADDRESS
              value: {{ required "Transaction Log API address is required" .Values.config.transactionLogApiAddress }}
            - name: LOG_TYPE
              value: {{ .Values.config.logType }}
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel }}
            - name: ENABLE_GRANT_HASH_SUGGESTION
              value: {{ .Values.config.enableGrantHashSuggestion | quote }}
            - name: DISABLE_CRL_CHECKS
              value: {{ quote .Values.config.disableCrlChecks }}
          {{- if .Values.extraEnv }}
            {{- toYaml .Values.extraEnv | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: certificate-group
              mountPath: /certificate-group
              readOnly: true
          {{- if .Values.https.enabled }}
            - name: certificate-server
              mountPath: /certificate-server
              readOnly: true
          {{- end }}
            - name: certificate-internal
              mountPath: /certificate-internal
            - name: group-ca-certificate
              mountPath: /config/group
              readOnly: true
            - name: internal-ca-certificate
              mountPath: /config/internal
          {{- if .Values.config.authorizationService.enabled }}
            - name: {{ if .Values.config.authorizationService.caCertificatePEMExistingSecret.name }}authorization-service-ca-certificate{{ else }}internal-ca-certificate{{ end }}
              mountPath: /config/authorization-service
          {{- end }}
          {{- if .Values.config.authZenService.enabled }}
            - name: {{ if .Values.config.authZenService.caCertificatePEMExistingSecret.name }}authzen-service-ca-certificate{{ else }}internal-ca-certificate{{ end }}
              mountPath: /config/authzen-service
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: certificate-group
          secret:
            secretName: {{ default (printf "%s-group-tls" (include  "open-fsc-outway.fullname" .)) .Values.certificates.group.existingSecret }}
            defaultMode: 0640
        - name: certificate-internal
          secret:
            secretName: {{ default (printf "%s-internal-tls" (include "open-fsc-outway.fullname" .)) .Values.certificates.internal.existingSecret }}
            defaultMode: 0640
        - name: group-ca-certificate
          secret:
            secretName: {{ default (printf "%s-group-ca-certificate" (include  "open-fsc-outway.fullname" .)) (default .Values.global.certificates.group.caCertificatePEMExistingSecret.name .Values.certificates.group.caCertificatePEMExistingSecret.name) }}
            defaultMode: 0640
            items:
              - key: {{ default "tls.crt" (default .Values.global.certificates.group.caCertificatePEMExistingSecret.key .Values.certificates.group.caCertificatePEMExistingSecret.key) }}
                path: ca-group.pem
        - name: internal-ca-certificate
          secret:
            secretName: {{ default (printf "%s-internal-ca-certificate" (include  "open-fsc-outway.fullname" .)) (default .Values.global.certificates.internal.caCertificatePEMExistingSecret.name .Values.certificates.internal.caCertificatePEMExistingSecret.name) }}
            defaultMode: 0640
            items:
              - key: {{ default "tls.crt" (default .Values.global.certificates.internal.caCertificatePEMExistingSecret.key .Values.certificates.internal.caCertificatePEMExistingSecret.key) }}
                path: ca.crt
      {{- if .Values.https.enabled }}
        - name: certificate-server
          secret:
            secretName:  {{ default  (printf "%s-tls-server" (include  "open-fsc-outway.fullname" .)) .Values.https.existingSecret.name }}
            defaultMode: 0640
            items:
              - key: {{ default "tls.crt" .Values.https.existingSecret.keyCertificate }}
                path: tls.crt
              - key: {{ default "tls.key" .Values.https.existingSecret.keyPrivateKey }}
                path: tls.key
            {{- end }}
      {{- if and .Values.config.authorizationService.enabled .Values.config.authorizationService.caCertificatePEMExistingSecret.name }}
        - name: authorization-service-ca-certificate
          secret:
          {{- with .Values.config.authorizationService.caCertificatePEMExistingSecret }}
            secretName: {{ .name }}
            defaultMode: 0640
            items:
              - key: {{ .key }}
                path: ca.crt
          {{- end }}
      {{- end }}
      {{- if and .Values.config.authZenService.enabled .Values.config.authZenService.caCertificatePEMExistingSecret.name }}
        - name: authzen-service-ca-certificate
          secret:
          {{- with .Values.config.authZenService.caCertificatePEMExistingSecret }}
            secretName: {{ .name }}
            defaultMode: 0640
            items:
              - key: {{ .key }}
                path: ca.crt
          {{- end }}
      {{- end }}
    {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
    {{- end }}

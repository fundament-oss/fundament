<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>FSC installations</title>
  </head>
  <body class="light">
    <div class="plugin-card">
      <h1 class="plugin-heading">FSC installations</h1>
      <table class="plugin-table">
        <thead>
          <tr>
            <th>Namespace</th>
            <th>Name</th>
            <th>Group</th>
            <th>Directory</th>
            <th>Phase</th>
            <th>Age</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr>
            <td colspan="6" class="plugin-text">Loading…</td>
          </tr>
        </tbody>
      </table>
      <div style="margin-top: 1.5rem">
        <button type="button" class="plugin-button" id="add">
          <svg class="plugin-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M10 4.5v11M4.5 10h11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
          </svg>
          Add installation
        </button>
      </div>
    </div>
    <script type="module">
      import {
        loadSdk,
        escapeHtml,
        formatAge,
        phase,
        emptyRow,
        errorRow,
        navigateToDetail,
        navigateToCreate,
      } from './_shared.js';

      const tbody = document.getElementById('rows');
      document.getElementById('add').addEventListener('click', () => navigateToCreate());

      try {
        await loadSdk();
        await fundament.init;
        const { items } = await fundament.k8s.list({
          group: 'openfsc.fundament.io',
          version: 'v1',
          resource: 'fscinstallations',
        });
        if (!items || items.length === 0) {
          tbody.innerHTML = emptyRow(6, 'No FSC installations found.');
        } else {
          tbody.innerHTML = items
            .map((item) => {
              const name = item.metadata?.name ?? '';
              const namespace = item.metadata?.namespace ?? '';
              return `
                <tr data-name="${escapeHtml(name)}" data-namespace="${escapeHtml(namespace)}">
                  <td>${escapeHtml(namespace)}</td>
                  <td><a href="#" class="row-link">${escapeHtml(name)}</a></td>
                  <td>${escapeHtml(item.spec?.groupID ?? '')}</td>
                  <td>${escapeHtml(item.spec?.directory?.mode ?? '')}</td>
                  <td>${escapeHtml(phase(item))}</td>
                  <td>${escapeHtml(formatAge(item.metadata?.creationTimestamp))}</td>
                </tr>`;
            })
            .join('');
          tbody.querySelectorAll('a.row-link').forEach((link) => {
            link.addEventListener('click', (e) => {
              e.preventDefault();
              const row = link.closest('tr');
              navigateToDetail(row.dataset.name, row.dataset.namespace);
            });
          });
        }
      } catch (err) {
        tbody.innerHTML = errorRow(6, err);
      }
    </script>
  </body>
</html>

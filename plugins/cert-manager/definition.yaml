apiVersion: fundament.io/v1
kind: PluginDefinition
metadata:
  name: cert-manager
  displayName: Cert Manager
  version: v1.17.2
  description: Automated TLS certificate management for Kubernetes using cert-manager.
  author: Fundament
  license: Apache-2.0
  icon: shield-check-mark
  urls:
    homepage: https://cert-manager.io
    repository: https://github.com/cert-manager/cert-manager
    documentation: https://cert-manager.io/docs
  tags:
    - certificates
    - tls
    - security
spec:
  permissions:
    capabilities:
      - internet_access
    rbac:
      # --- Runtime resources the plugin reconciles / surfaces in the UI ---
      - apiGroups:
          - cert-manager.io
        resources:
          - certificates
          - issuers
          - clusterissuers
          - certificaterequests
        verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
      - apiGroups:
          - acme.cert-manager.io
        resources:
          - orders
          - challenges
        verbs:
          - get
          - list
          - watch
      # --- Install-time permissions ---
      # The plugin runs `helm upgrade --install cert-manager … --create-namespace
      # --wait` with Helm's default "secret" storage driver. These rules grant
      # exactly what Helm and the cert-manager v1.17 chart need to create and
      # wait on the release. Rules are cluster-wide (PolicyRule carries no
      # namespace); escalate/bind let the installer create cert-manager's own
      # ClusterRoles/RoleBindings without re-declaring every rule they contain.
      - apiGroups:
          - ""
        resources:
          - namespaces # helm --create-namespace
        verbs:
          - get
          - list
          - create
      - apiGroups:
          - ""
        resources:
          - secrets # Helm release storage + cert-manager CA/serving secrets
          - serviceaccounts
          - services
          - configmaps
        verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
      - apiGroups:
          - ""
        resources:
          - pods # helm --wait readiness polling
        verbs:
          - get
          - list
          - watch
      - apiGroups:
          - apps
        resources:
          - deployments # controller, cainjector, webhook (+ --wait)
        verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
      - apiGroups:
          - apps
        resources:
          - replicasets # helm --wait polls the Deployment rollout via ReplicaSets
        verbs:
          - get
          - list
          - watch
      - apiGroups:
          - batch
        resources:
          - jobs # cert-manager's startupapicheck post-install hook Job
        verbs:
          - get
          - list
          - watch
          - create
          - delete
      - apiGroups:
          - apiextensions.k8s.io
        resources:
          - customresourcedefinitions
        verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
      - apiGroups:
          - admissionregistration.k8s.io
        resources:
          - validatingwebhookconfigurations
          - mutatingwebhookconfigurations
        verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
      - apiGroups:
          - rbac.authorization.k8s.io
        resources:
          - clusterroles
          - roles
        verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
          - bind # create (Cluster)RoleBindings that reference these
          - escalate # write cert-manager's rules without holding them all
      - apiGroups:
          - rbac.authorization.k8s.io
        resources:
          - clusterrolebindings
          - rolebindings
        verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
  menu:
    organization:
      - crd: clusterissuers.cert-manager.io
        list: true
        detail: true
        icon: rectangle-stack
    project:
      - crd: certificates.cert-manager.io
        list: true
        detail: true
        icon: file-text
      - crd: issuers.cert-manager.io
        list: true
        detail: true
        icon: rectangle-stack
      - crd: certificaterequests.cert-manager.io
        list: true
        detail: true
        icon: magnifier
  crds:
    - certificates.cert-manager.io
    - certificaterequests.cert-manager.io
    - issuers.cert-manager.io
    - clusterissuers.cert-manager.io
  uiHints:
    certificates.cert-manager.io:
      statusMapping:
        jsonPath: ".status.conditions[?(@.type==\"Ready\")].status"
        values:
          "True":
            badge: success
            label: Ready
          "False":
            badge: danger
            label: Not Ready
    clusterissuers.cert-manager.io:
      statusMapping:
        jsonPath: ".status.conditions[?(@.type==\"Ready\")].status"
        values:
          "True":
            badge: success
            label: Ready
          "False":
            badge: danger
            label: Not Ready
  customComponents:
    Certificate:
      list: certificates-list.html
      detail: certificates-detail.html
    CertificateRequest:
      list: certificaterequests-list.html
      detail: certificaterequests-detail.html
    Issuer:
      list: issuers-list.html
      detail: issuers-detail.html
    ClusterIssuer:
      list: clusterissuers-list.html
      detail: clusterissuers-detail.html
  allowedResources:
    - group: cert-manager.io
      version: v1
      resource: certificates
      verbs: [list, get]
    - group: cert-manager.io
      version: v1
      resource: certificaterequests
      verbs: [list, get]
    - group: cert-manager.io
      version: v1
      resource: issuers
      verbs: [list, get]
    - group: cert-manager.io
      version: v1
      resource: clusterissuers
      verbs: [list, get]

apiVersion: fundament.io/v1
kind: PluginDefinition
metadata:
  name: cert-manager
  displayName: Cert Manager
  version: v1.17.2
  description: Automated TLS certificate management for Kubernetes using cert-manager.
  author: Fundament
  license: Apache-2.0
  icon: shield-check-mark
  urls:
    homepage: https://cert-manager.io
    repository: https://github.com/cert-manager/cert-manager
    documentation: https://cert-manager.io/docs
  tags:
    - certificates
    - tls
    - security
spec:
  permissions:
    capabilities:
      - internet_access
    rbac:
      - apiGroups:
          - cert-manager.io
        resources:
          - certificates
          - issuers
          - clusterissuers
          - certificaterequests
        verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
      - apiGroups:
          - acme.cert-manager.io
        resources:
          - orders
          - challenges
        verbs:
          - get
          - list
          - watch
  menu:
    organization:
      - crd: clusterissuers.cert-manager.io
        list: true
        detail: true
        create: true
        icon: rectangle-stack
    project:
      - crd: certificates.cert-manager.io
        list: true
        detail: true
        create: true
        icon: file-text
      - crd: issuers.cert-manager.io
        list: true
        detail: true
        create: true
        icon: rectangle-stack
      - crd: certificaterequests.cert-manager.io
        list: true
        detail: true
        create: false
        icon: magnifier
  crds:
    - certificates.cert-manager.io
    - certificaterequests.cert-manager.io
    - issuers.cert-manager.io
    - clusterissuers.cert-manager.io
  uiHints:
    certificates.cert-manager.io:
      statusMapping:
        jsonPath: ".status.conditions[?(@.type==\"Ready\")].status"
        values:
          "True":
            badge: success
            label: Ready
          "False":
            badge: danger
            label: Not Ready
    clusterissuers.cert-manager.io:
      statusMapping:
        jsonPath: ".status.conditions[?(@.type==\"Ready\")].status"
        values:
          "True":
            badge: success
            label: Ready
          "False":
            badge: danger
            label: Not Ready
  customComponents:
    Certificate:
      list: certificates-list.html
      detail: certificates-detail.html
    CertificateRequest:
      list: certificaterequests-list.html
      detail: certificaterequests-detail.html
    Issuer:
      list: issuers-list.html
      detail: issuers-detail.html
    ClusterIssuer:
      list: clusterissuers-list.html
      detail: clusterissuers-detail.html
  allowedResources:
    - group: cert-manager.io
      version: v1
      resource: certificates
      verbs: [list, get]
    - group: cert-manager.io
      version: v1
      resource: certificaterequests
      verbs: [list, get]
    - group: cert-manager.io
      version: v1
      resource: issuers
      verbs: [list, get]
    - group: cert-manager.io
      version: v1
      resource: clusterissuers
      verbs: [list, get]

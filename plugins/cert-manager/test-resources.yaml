apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: test-cert
  namespace: fundament
spec:
  secretName: test-cert-tls
  duration: 2160h # 90 days
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
  commonName: test.fundament.local
  dnsNames:
    - test.fundament.local

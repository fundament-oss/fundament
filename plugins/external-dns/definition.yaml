apiVersion: fundament.io/v1
kind: PluginDefinition
metadata:
  name: external-dns
  displayName: External DNS
  version: v1.16.1
  description: Automatic DNS record management for Kubernetes resources using ExternalDNS.
  author: Fundament
  license: Apache-2.0
  icon: world
  urls:
    homepage: https://kubernetes-sigs.github.io/external-dns/
    repository: https://github.com/kubernetes-sigs/external-dns
    documentation: https://kubernetes-sigs.github.io/external-dns/latest/
  tags:
    - dns
    - networking
spec:
  permissions:
    capabilities:
      - internet_access
    rbac:
      - apiGroups:
          - externaldns.k8s.io
        resources:
          - dnsendpoints
        verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
      - apiGroups:
          - externaldns.k8s.io
        resources:
          - dnsendpoints/status
        verbs:
          - get
          - list
          - watch
  menu:
    project:
      - crd: dnsendpoints.externaldns.k8s.io
        list: true
        detail: true
        create: true
        icon: world
  uiHints:
    dnsendpoints.externaldns.k8s.io:
      statusMapping:
        jsonPath: ".status.observedGeneration"
        values:
          "0":
            badge: warning
            label: Pending
        default:
          badge: success
          label: Active

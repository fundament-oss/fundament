apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: fundament

# Build configuration for all images
build:
  # Local build settings - load directly into k3d (no registry needed)
  local:
    useBuildkit: true
    concurrency: 0
    push: true

  artifacts:
    - image: authn-api
      context: .
      docker:
        dockerfile: authn-api/Dockerfile

    - image: organization-api
      context: .
      docker:
        dockerfile: organization-api/Dockerfile

    - image: db-migrations
      context: db
      docker:
        dockerfile: Dockerfile

    - image: console-frontend
      context: .
      docker:
        dockerfile: console-frontend/Dockerfile
        buildArgs:
          APP_CONFIGURATION: development
          GITHUB_TOKEN: "{{.GITHUB_TOKEN}}"

    - image: cluster-worker
      context: .
      docker:
        dockerfile: cluster-worker/Dockerfile

    - image: docs-frontend
      context: .
      docker:
        dockerfile: docs-frontend/Dockerfile

    - image: authz-worker
      context: .
      docker:
        dockerfile: authz-worker/Dockerfile

    - image: kube-api-proxy
      context: .
      docker:
        dockerfile: kube-api-proxy/Dockerfile

    - image: openfga-setup
      context: openfga/setup
      docker:
        dockerfile: Dockerfile

    - image: plugin-controller
      context: .
      docker:
        dockerfile: plugin-controller/Dockerfile

deploy:
  kubeContext: REQUIRES-PROFILE # kubeContext is intentionally invalid to prevent accidental deployments without a profile.
  statusCheck: true
  statusCheckDeadlineSeconds: 300
  tolerateFailuresUntilDeadline: true
  helm:
    releases:
      - name: fundament
        chartPath: charts/fundament
        namespace: fundament
        createNamespace: true
        setValueTemplates:
          images.dbMigrations: "{{.IMAGE_FULLY_QUALIFIED_db_migrations}}"
          images.authnApi: "{{.IMAGE_FULLY_QUALIFIED_authn_api}}"
          images.organizationApi: "{{.IMAGE_FULLY_QUALIFIED_organization_api}}"
          images.consoleFrontend: "{{.IMAGE_FULLY_QUALIFIED_console_frontend}}"
          images.clusterWorker: "{{.IMAGE_FULLY_QUALIFIED_cluster_worker}}"
          images.docsFrontend: "{{.IMAGE_FULLY_QUALIFIED_docs_frontend}}"
          images.authzWorker: "{{.IMAGE_FULLY_QUALIFIED_authz_worker}}"
          images.kubeApiProxy: "{{.IMAGE_FULLY_QUALIFIED_kube_api_proxy}}"
          images.openfgaSetup: "{{.IMAGE_FULLY_QUALIFIED_openfga_setup}}"
          images.pluginController: "{{.IMAGE_FULLY_QUALIFIED_plugin_controller}}"

profiles:
  - name: env-local
    deploy:
      kubeContext: k3d-fundament
    patches:
      - op: add
        path: /deploy/helm/releases/0/valuesFiles
        value:
          - charts/fundament/values-local.yaml

  - name: env-production
    deploy:
      kubeContext: PRODUCTION-NOT-AVAILABLE-YET
    patches:
      - op: add
        path: /deploy/helm/releases/0/valuesFiles
        value:
          - charts/fundament/values-production.yaml

  # Local Gardener profile - use real local Gardener instead of mock.
  # Requires: just cluster-worker gardener-up (generates values-gardener-local.yaml)
  - name: local-gardener
    patches:
      - op: add
        path: /deploy/helm/releases/0/setValues
        value:
          clusterWorker.gardenerMode: real
          clusterWorker.gardenerKubeconfigSecret: gardener-kubeconfig
          shootProxy.enabled: true
          kubeApiProxy.mode: real
          kubeApiProxy.gardenerKubeconfigSecret: gardener-kubeconfig
          organizationApi.kubeApiProxyInsecure: "true"
      - op: add
        path: /deploy/helm/releases/0/valuesFiles/-
        value: charts/fundament/values-gardener-local.yaml

  # Hot reload profile for local development
  - name: hotreload
    patches:
      - op: replace
        path: /build/artifacts/0/docker/dockerfile
        value: authn-api/hotreload/Dockerfile
      - op: add
        path: /build/artifacts/0/sync
        value: {}
      - op: replace
        path: /build/artifacts/1/docker/dockerfile
        value: organization-api/hotreload/Dockerfile
      - op: add
        path: /build/artifacts/1/sync
        value: {}
      - op: replace
        path: /build/artifacts/3/docker/dockerfile
        value: console-frontend/hotreload/Dockerfile
      - op: add
        path: /build/artifacts/3/sync
        value: {}
      - op: replace
        path: /build/artifacts/4/docker/dockerfile
        value: cluster-worker/hotreload/Dockerfile
      - op: add
        path: /build/artifacts/4/sync
        value: {}
      - op: replace
        path: /build/artifacts/5/docker/dockerfile
        value: docs-frontend/hotreload/Dockerfile
      - op: add
        path: /build/artifacts/5/sync
        value: {}
      - op: replace
        path: /build/artifacts/6/docker/dockerfile
        value: authz-worker/hotreload/Dockerfile
      - op: add
        path: /build/artifacts/6/sync
        value: {}
      - op: replace
        path: /build/artifacts/7/docker/dockerfile
        value: kube-api-proxy/hotreload/Dockerfile
      - op: add
        path: /build/artifacts/7/sync
        value: {}

  # Debug profile: rebuilds kube-api-proxy with dlv (port-forward handled by dev-debug in Justfile)
  - name: debug
    patches:
      - op: replace
        path: /build/artifacts/7/docker/dockerfile
        value: kube-api-proxy/hotreload/debug/Dockerfile
